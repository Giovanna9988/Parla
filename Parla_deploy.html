ra questi non costituisce un elemento essenziale del contratto?","opts":["La causa","Il termine","L'oggetto"]},{"id":1358,"area":"civ","q":"La condizione impossibile (ad esempio, se toccherai il cielo con un dito) quali conseguenze produce nel contratto?","opts":["Rende sempre nullo il contratto cui è apposta","Rende nullo il contratto, solo se si tratta di condizione sospensiva","Rende nullo il contratto solo se si tratta di condizione risolutiva"]},{"id":1359,"area":"civ","q":"Quale fra questi non è un requisito essenziale dell'oggetto del contratto?","opts":["La possibilità","La liceità","La materialità"]},{"id":1360,"area":"civ","q":"Quali sono i contratti \"unilaterali\"?","opts":["Quelli conclusi dal rappresentante con se stesso","Quelli che, pur implicando l'esistenza di due parti e di due distinte dichiarazioni di volontà, generano l'obbligo della prestazione per una sola parte","Quelli in cui due o più parti conferiscono beni o servizi per il conseguimento di uno scopo comune"]},{"id":1361,"area":"civ","q":"Si dicono contratti reali quelli che:","opts":["Trasferiscono diritti reali","Fanno sorgere diritti di credito","Richiedono per la loro conclusione la consegna della cosa"]},{"id":1362,"area":"civ","q":"Quale fra questi non è un contratto a prestazioni corrispettive?","opts":["La locazione","La permuta","La donazione"]},{"id":1363,"area":"civ","q":"La proposta contrattuale, di regola, può essere revocata:","opts":["Fino a che essa non sia giunta a conoscenza del destinatario","Fino a che al proponente non sia giunta notizia dell'accettazione","Fino a che il contratto non sia eseguito"]},{"id":1364,"area":"civ","q":"Marzia propone a Carla l'acquisto di un monile; la relativa trattativa si svolge per telefono e dopo una breve contrattazione del prezzo, l'accordo viene raggiunto. A seguito di quest'ultimo, Carla promette di inviare un acconto sul prezzo a mezzo di vaglia postale, mentre Marzia, da parte sua, si impegna ad inviare il monile entro una settimana. In quale momento il contratto sarà tecnicamente concluso?","opts":["Nel momento in cui Marzia (venditrice) entra materialmente in possesso dell'acconto","Nel momento in cui le parti si dichiarano, per telefono, reciprocamente d'accordo.","Nel momento in cui il vaglia giunge al domicilio di Marzia anche in sua assenza"]},{"id":1365,"area":"civ","q":"Le condizioni generali di contratto, ossia quelle predisposte dall'offerente, sono valide nei confronti dell'altro contraente:","opts":["Solo se l'altro contraente le ha specificatamente sottoscritte","Solo se l'altro contraente le ha conosciute o avrebbe dovuto conoscerle usando l'ordinaria diligenza","Solo se esse sono conformi agli usi contrattuali seguiti nel luogo dove il contratto è concluso"]},{"id":1366,"area":"civ","q":"Il sig.Bruto intende acquistare una partita di cemento dal sig.Cassio, imprenditore edile. I due stipulano un contratto di vendita; con esso il sig.Cassio, in un'apposita clausola, si riserva il potere d aumentare il prezzo del bene alienato, senza che però il sig.Bruto possa recedere dal contratto. Ciò finanche se il prezzo finale sia enormemente superiore a quello originariamente convenuto. E' valida una simile clausola, anche se non specificamente approvata dal sig.Bruto?","opts":["Sì, ma solo se si dimostra che l'aderente (il sig.Bruto) la conosceva, o avrebbe dovuto conoscerla secondo l'ordinaria diligenza.","No, la clausola è sempre nulla e travolge l'intero contratto","No, è inefficace mentre il contratto resta valido"]},{"id":1367,"area":"civ","q":"Il contratto col quale le parti si obbligano a stipulare un futuro contratto si definisce:","opts":["Contratto preliminare","Contratto di opzione","Atto di prelazione"]},{"id":1368,"area":"civ","q":"Se Tizio cede un suo diritto immobiliare a Caio e poi, con successivo contratto, cede lo stesso diritto a Sempronio, quale dei due deve essere considerato il nuovo titolare del diritto?","opts":["Sempronio, se in buona fede","Chi, tra i due, ha curato per primo la trascrizione del titolo","Sempronio, anche se in mala fede"]},{"id":1369,"area":"civ","q":"Il signor Nerio Scalogna, sta per annegare nel Po; il signor Ricattini, trovandosi a passare di là, si prodiga per salvarlo. Tuttavia, prima di fare ciò, lo induce a stipulare un contratto \"a condizioni inique\". Il contratto è:","opts":["Risolubile","Rescindibile ex art.1447 c.c. (contratto concluso in stato di pericolo).","Annullabile"]},{"id":1370,"area":"civ","q":"In quanti anni si prescrive l'azione di rescissione del contratto:","opts":["Un anno","Due anni","Cinque anni"]},{"id":1371,"area":"civ","q":"Paolo si è impegnato con Pietro ad alienargli 5 tonnellate di uova, da consegnarsi non oltre la fine del mese corrente. In caso di ritardo nella relativa consegna, Paolo sarà costretto a pagare una certa somma a titolo di sanzione. Contrariamente alle previsioni, il ritardo, e anche considerevole, si verifica, ma Paolo si rifiuta di pagare la penale stabilita. Potrà Pietro ottenerla ugualmente?","opts":["Sì, purchè Pietro dimostri di aver effettivamente subito un danno","Sì, in ogni caso","No, perché diversamente Pietro si arricchirebbe senza una giusta causa."]},{"id":1372,"area":"civ","q":"E' rescindibile ex art.1448 c.c. il contratto di assicurazione?","opts":["Solo nel caso in cui ciò sia espressamente previsto dal contratto","No, mai","Sì, sempre, per espressa previsione legislativa"]},{"id":1373,"area":"civ","q":"La sentenza con cui si pronuncia la rescissione del contratto è:","opts":["Dichiarativa","Dichiarativa con effetti costitutivi","Costitutiva"]},{"id":1374,"area":"civ","q":"Quale fra queste non è una causa di risoluzione del contratto?","opts":["L'inadempimento","L'eccessiva onerosità","L'approfittamento dello stato di bisogno"]},{"id":1375,"area":"civ","q":"Il sig.De Artistis, impresario, è costretto ad assumere una nuova attrice per sostituire la protagonista, costretta a letto da un terribile febbrone. La neo-assunta, sig.na Divetti, il giorno della rappresentanzione non si presenta affatto, provocando le ire del sig. De Artistis, che decide di risolvere il contratto. E' necessario che in questo caso il nostro amico si rivolga al giudice per ottenere lo scioglimento del vincolo contrattuale?","opts":["Sì, perché la risoluzione per inadempimento opera solo ope iudicis","Sì, perché in questo caso si è in presenza di un termine considerato non essenziale","No, poiché in presenza di termine essenziale (come nel caso in esame) la risoluzione opera ipso iure, ma potrà rivolgersi al giudice per ottenerne la sentenza dichiarativa"]},{"id":1378,"area":"civ","q":"Paola stipula con Giorgio un contratto, riservandosi la facoltà di nominare, entro una settimana, la persona che dovrà acquistare i diritti e gli obblighi derivanti dal contratto stesso. Alla scadenza convenuta Paola comunica al Giorgio la nomina di Valeria, che l'accetta espressamente. Quand'è che Valeria diventa parte del contratto?","opts":["Da quando la dichiarazione di nomina (da parte di Paola) viene comunicata alla controparte (Giorgio)","Da quando il contratto è stato stipulato","Dalla data di dichiarazione della nomina"]},{"id":1379,"area":"civ","q":"A quali contratti non si applica l'istituto della risoluzione per eccessiva onerosità sopravvenuta?","opts":["Ai contratti aleatori","A nessuno, perché l'istituto in esame ha portata generale","Ai contratti plurilaterali"]},{"id":1380,"area":"civ","q":"Il signor Giovanni Immobiliare vende il 1° gennaio un appartamento, pattuendo con l'acquirente che la vendita avrà effetto solo a partire dal 1° luglio. Il 15 giugno però un terribile incendio distrugge l'intero palazzo. L'acquirente a questo punto deve ritenersi:","opts":["Legittimato a ricorrere al giudice per ottenere la pronuncia di risoluzione","Obbligato comunque a corrispondere il prezzo pattuito","Tenuto a corrispondere al venditore un equo indennizzo"]},{"id":1381,"area":"civ","q":"Il signor Hamburgher si è impegnato a rifornire il ristorante \"La Mensa\" di 1000 polpette preconfezionate alla settimana, con l'intesa che ogni 27 del mese gli sarà versato il corrispettivo. Senonchè il 20 del mese successivo gli viene revocata la licenza impedendogli, così, di continuare ad eseguire la fornitura. Il titolare del ristorante a questo punto:","opts":["Nulla deve, essendo diventato proprietario del panini ex art.1153 c.c.","E' tenuto nonostante la risoluzione a pagare tutte le forniture ricevute","E' tenuto a corrispondere alla controparte solo un'equa indennità"]},{"id":1382,"area":"civ","q":"In quale, tra le seguenti ipotesi, la risoluzione contrattuale non opera \"di diritto\", ma abbisogna di apposita pronuncia giudiziale?","opts":["Se l'inadempimento perdura in seguito alla scadenza del termine fissato nella diffida ad adempiere","Quando la prestazione di una delle parti è divenuta, a seguito di avvenimenti straordinari e imprevedibili, eccessivamente onerosa","Quando il creditore insoddisfatto dichiara di valersi della clausola risolutiva espressa"]},{"id":1383,"area":"civ","q":"E' revocabile l'accettazione di una proposta contrattuale?","opts":["Sì, purchè la revoca giunga a conoscenza del proponente prima dell'accettazione","No, salvo che la natura dell'affare o altre circostanze lo consentano","Sì, solo in presenza di una giusta causa"]},{"id":1384,"area":"civ","q":"Secondo il codice civile, la illiceità della causa in un contratto plurilaterale, ne determina:","opts":["In ogni caso l'annullabilità","In ogni caso la rescindibilità","In ogni caso la nullità"]},{"id":1385,"area":"civ","q":"Secondo il codice civile, il motivo illecito che ha determinato una soltanto delle parti in modo esclusivo alla conclusione di un contratto di appalto:","opts":["Determina l'annullabilità del contratto","Determina la rescindibilità del contratto","Non ha rilevanza"]},{"id":1386,"area":"civ","q":"Il contratto sottoposto a condizione sospensiva, se la prestazione inizialmente impossibile diviene possibile prima dell'avveramento della condizione:","opts":["E' invalido, salvo che sia stata già adempiuta la prestazione a carico dell'altra parte","E' valido","E' nullo, se non risulta espressamente una diversa volontà delle parti"]},{"id":1387,"area":"civ","q":"L'assunzione di un obbligo subordinata ad una condizione sospensiva che la faccia dipendere dalla mera volontà del debitore è:","opts":["Nulla","Annullabile","Valida se è fissato un termine per l'avveramento della condizione"]},{"id":1388,"area":"civ","q":"Il contratto obbliga le parti solo a quanto è nel medesimo espresso?","opts":["Sì, obbliga le parti solo a quanto è nel medesimo espressamente convenuto, con esclusione di ogni integrazione","No, obbliga le parti anche alle conseguenze che ne derivano secondo la legge, ma non secondo gli usi o l'equità","No, obbliga le parti anche a tutte le conseguenze che ne derivano secondo la legge o, in mancanza, secondo gli usi e l'equità"]},{"id":1389,"area":"civ","q":"In tema di rappresentanza volontaria, nei casi in cui è rilevante lo stato di buona o mala fede, di scienza o di ignoranza di determinate circostanze, si ha riguardo alla persona del:","opts":["Rappresentato in ogni caso","Rappresentante, salvo che si tratti di elementi predeterminati dal rappresentato","Rappresentante, anche se si tratti di elementi predeterminati dal rappresentato"]},{"id":1390,"area":"civ","q":"Tizio, con vendita simulata, aliena il fondo Tuscolano a Caio. Quest'ultimo, profittando dell'apparenza che lo rende proprietario di quel bene, lo vende a Sempronio che è in buona fede. Nel nostro caso, Tizio:","opts":["Potrà opporre la simulazione solo se la trascrizione della domanda di simulazione è avvenuta prima della trascrizione dell'acquisto di Sempronio","Potrà sempre opporre la simulazione","Non potrà in nessun caso opporre la simulazione a Sempronio"]},{"id":1391,"area":"civ","q":"L'errore di calcolo dà luogo ad annullamento del contratto?","opts":["No, dà luogo solo a rettifica, anche se, concretandosi in errore sulla quantità, sia stato determinante del consenso","No, dà luogo solo a rettifica, tranne che, concretandosi in errore sulla quantità, sia stato determinante del consenso","Sì, purchè la misura reale sia superiore di un ventesimo rispetto a quella indicata nel contratto, mentre in caso contrario dà luogo solo a rettifica"]},{"id":1392,"area":"civ","q":"A norma del codice civile, il contratto rescindibile:","opts":["Può essere convalidato","Non può essere convalidato salvo che si tratti di contratto ad esecuzione continuata o periodica","Non può essere convalidato"]},{"id":1393,"area":"civ","q":"Ai sensi del codice civile, nel contratto concluso tra un consumatore ed un professionista, avente ad oggetto la cessione di beni o la prestazione di servizi, si presumono vessatorie fino a prova contraria, le clausole - non oggetto di specifica trattativa - che hanno per oggetto o per effetto di:","opts":["Sancire a carico del consumatore deroghe alla competenza dell'autorità giudiziaria","Consentire al professionista di recedere da contratti a tempo indeterminato senza un ragionevole preavviso nel caso di giusta causa","Imporre ad entrambi i contraenti, in caso di ritardo nell'adempimento, il pagamento di una somma di denaro a titolo di risarcimento"]},{"id":1394,"area":"civ","q":"Può un contraente sospendere l'esecuzione della prestazione da lui dovuta se le condizioni patrimoniali dell'altro sono divenute tali da porre in evidente pericolo il conseguimento della controprestazione?","opts":["Sì, salvo che sia prestata garanzia personale, non essendo idoneo alcun altro tipo di garanzia","No, anche se non sia prestata idonea garanzia","Sì, salvo che sia prestata idonea garanzia"]},{"id":1395,"area":"civ","q":"Nei contratti con più di due parti, in cui le prestazioni di ciascuno sono dirette al conseguimento di uno scopo comune, l'annullabilità che riguarda il vincolo di una sola di esse importa l'annullamento del contratto?","opts":["Sì, se l'annullabilità dipenda da violenza, e ciò anche se la partecipazione della parte il cui vincolo sia annullabile debba, secondo le circostanze, considerarsi non essenziale","No, salvo che la partecipazione della parte il cui vincolo sia annullabile debba, secondo le circostanze, considerarsi essenziale","No, mai"]},{"id":1396,"area":"civ","q":"Entro quale termine si prescrive l'azione di annullamento di un contratto quando l'annullabilità dipende da dolo?","opts":["In cinque anni dal giorno in cui il contratto ha avuto esecuzione","In cinque anni dal giorno della conclusione del contratto","In cinque anni dal giorno in cui è stato scoperto il dolo"]},{"id":1397,"area":"civ","q":"Salvo diverse disposizioni di legge, la nullità di un contratto:","opts":["Può essere fatta valere da chiunque vi abbia interesse e può essere rilevata d'ufficio dal giudice","Può essere fatta valere da chiunque vi abbia interesse con esclusione dei contraenti e non può essere rilevata d'ufficio dal giudice","Può essere fatta valere solo dai contraenti congiuntamente e può essere rilevata d'ufficio dal giudice"]},{"id":1398,"area":"civ","q":"Il contratto di compravendita è un contratto:","opts":["Reale","Ad efficacia solo obbligatoria","Consensuale"]},{"id":1399,"area":"civ","q":"Nella vendita di cosa altrui in quale momento si realizza il trasferimento della proprietà?","opts":["Nel momento in cui si perfeziona il contratto","Nel momento in cui il venditore acquista la proprietà del bene oggetto del contratto","Nel momento in cui il venditore consegna al compratore il bene oggetto del contratto"]},{"id":1400,"area":"civ","q":"Quale tra le seguenti non è un'obbligazione del venditore?","opts":["Fare acquistare al compratore la proprietà della cosa o la titolarità del diritto oggetto dello scambio","Consegnare la cosa al compratore","Pagare le spese del contratto di vendita"]},{"id":1401,"area":"civ","q":"Il Sig. Nullotengo, oberato dai debiti, ha necessità di procurarsi un'ingente somma di danaro e decide, pertanto, di vendere un fondo di sua proprietà. Egli ha intenzione però di riservarsi la possibilità di tornare in proprietà del fondo, restituendo al compratore il prezzo e, eventualmente, le spese che questi abbia sopportato per migliorarne le condizioni. Quale contratto dovrà stipulare il sig. Nullotengo?","opts":["Vendita con riserva di proprietà","Vendita con patto di retrovendita","Vendita con patto di riscatto"]},{"id":1402,"area":"civ","q":"Nella vendita con riserva di proprietà il rischio per il perimento della cosa passa al compratore:","opts":["Nel momento in cui acquista la proprietà","Al momento della consegna","Nel momento in cui il compratore versa una somma pari ad almeno la metà del prezzo dovuto"]},{"id":1403,"area":"civ","q":"Il sig. Berluschi cede al sig. Agnellini stipulando un contratto con il quale il primo cede al secondo un suolo edificatorio e, quale controprestazione, acquista la proprietà di una villetta al mare. Poiché la villetta ha un valore inferiore a quello del suolo, il sig. Agnellini versa al sig. Berluschi anche una piccola somma di denaro. Quale contratto hanno sitpulato il sig. Berluschi e il sig. Agnellini?","opts":["Compravendita","Permuta","Un contratto misto"]},{"id":1404,"area":"civ","q":"Il libraio Volpino conviene con il proprio fornitore Buzzacchi che gli pagherà il prezzo di una grossa partita di libri soltanto se riuscirà a smerciarla, altrimenti gli restituirà la merce. Quale contratto hanno stipulato i signori Volpino e Buzzacchi?","opts":["Deposito","Contratto estimatorio","Comodato"]},{"id":1405,"area":"civ","q":"Il contratto di somministrazione si distingue dalla vendita obbligatoria perché:","opts":["La somministrazione ha efficacia reale e non obbligatoria","Nella vendita obbligatoria la prestazione è unica, mentre nella somministrazione vi è una pluralità di prestazioni","Nella somministrazione la prestazione, pur essendo unica come nella vendita obbligatoria, è suddivisa in frazioni, che sono eseguite in tempi diversi"]},{"id":1406,"area":"civ","q":"Il contratto col quale una parte si obbliga a far godere all'altra una cosa mobile o immobile per un dato tempo, verso un determinato corrispettivo è:","opts":["La locazione","Il comodato","Il deposito"]},{"id":1407,"area":"civ","q":"Il sig. Condotti, locatario di un appartamento di proprietà del sig.Locatelli, apporta all'immobile modifiche che ne aumentano considerevolmente il valore. Al termine della locazione egli si rivolge al sig. Locatelli al fine di ottenere l'indennità per i miglioramenti apportati al bene locato. E' fondata la pretesa del sig. Condotti?","opts":["No, perché il conduttore non ha diritto a indennità per i miglioramenti","Soltanto per i miglioramenti espressamente convenuti nel contratto di locazione","Soltanto se il locatore abbia acconsentito alle opere di miglioramento"]},{"id":1408,"area":"civ","q":"Il mutuo non è un contratto:","opts":["Reale","Traslativo","Consensuale"]},{"id":1409,"area":"civ","q":"Se nel mutuo sono pattuiti interessi usurari:","opts":["Il contratto è totalmente nullo","La clausola che stabilisce gli interessi usurari è nulla, per cui il contratto resta valido ma non è dovuto alcun interesse","La clausola usuraria è nulla ma resta fermo l'obbligo degli interessi nella misura legale"]},{"id":1410,"area":"civ","q":"Qual è la differenza tra l'appalto ed il contratto d'opera?","opts":["Nel contratto d'opera il rischio è a carico del prestatore d'opera, mentre nel contratto di appalto è a carico del committente","Il contratto d'opera può avere ad oggetto solo la prestazione di beni, l'appalto, invece, la prestazione di beni o servizi","Il contratto d'opera riguarda l'impiego del lavoro del prestatore d'opera o dei suoi dipendenti, mentre nell'appalto non ha rilevanza che l'attività lavorativa sia prestata direttamente dall'appaltatore"]},{"id":1412,"area":"civ","q":"Il collaudo rappresenta:","opts":["Un diritto del committente","Un onere dell'appaltatore","Un diritto ed un onere del committente"]},{"id":1413,"area":"civ","q":"Il mandato generale:","opts":["Comprende solo gli atti eccedenti l'ordinaria anmministrazione","Comprende gli atti di ordinaria e straordinaria amministrazione","Comprende solo gli atti di ordinaria amministrazione"]},{"id":1414,"area":"civ","q":"Se il mandatario agisce sulla base di un mandato senza rappresentanza ed eccede i limiti fissati nel mandato, l'atto che esorbita dal mandato:","opts":["E' inefficace, salva la responsabilità del mandatario verso il terzo in buona fede","Resta a carico del mandatario se il mandante non lo ratifica","E' vincolante per il mandante a tutela dell'affidamento del terzo in buona fede, salva la responsabilità del mandatario verso il mandante"]},{"id":1415,"area":"civ","q":"Il sig. Mitter conviene con la ditta Tuttogas di trasportare sei casse di vino da Firenze a Milano e di consegnarle al sig. Destinato, al quale il sig. Mitter intende fare un regalo. Quali sono le parti del contratto?","opts":["Mitter e Tuttogas","Mitter e Destinato","Mitter, Tuttogas e Destinato"]},{"id":1416,"area":"civ","q":"Espedito, di professione spedizioniere, assume l'obbligo di concludere per conto di Guido un contratto di trasporto. A tal fine egli entra in trattativa con il sig. Compare, ma proprio quando l'accordo sta per essere raggiunto, Guido gli comunica di non aver più interesse alla conclusione dell'affare. Può Guido revocare del tutto l'incarico?","opts":["Sì, perché il mittente può revocare l'ordine di spedizione in ogni momento","Sì, perché lo spedizioniere (Espedito) non ha ancora concluso il contratto di trasporto","No, perché lo spedizioniere ha già dato corso alle trattative"]},{"id":1417,"area":"civ","q":"Possono applicarsi alla commissione le norme che regolano il mandato?","opts":["Sì","Soltanto quelle relative al mandato senza rappresentanza","No"]},{"id":1418,"area":"civ","q":"Il deposito è:","opts":["Il contratto con il quale una parte si obbliga a far godere all'altra una cosa mobile o immobile per un dato tempo, verso un determinato corrispettivo","Il contratto col quale una parte riceve dall'altra una cosa mobile con l'obbligo di custodirla e restituirla in natura","Il contratto col quale una parte consegna all'altra una cosa mobile o immobile, affinchè se ne serva per un tempo o per un uso determinato, con l'obbligo di restituire la stessa cosa ricevuta"]},{"id":1419,"area":"civ","q":"Il depositario può servirsi della cosa depositata:","opts":["Sempre","Mai","Solo nel deposito irregolare"]},{"id":1420,"area":"civ","q":"Il giovane Mevio, di anni venti, stipula con l'impresa \"Un'Assicurazione per tutti\" un contratto di assicurazione sulla vita. Il giovane, al fine di realizzare vantaggiose condizioni contrattuali, tace le precarie condizioni della propria salute. L'impresa assicuratrice decide di agire in giudizio. Qual è l'azione concessa alla compagnia assicuratrice?","opts":["Azione di nullità","Azione di annullamento","Azione di rescissione"]},{"id":1421,"area":"civ","q":"Può l'apertura di credito essere a tempo indeterminato?","opts":["No, perché la natura del contratto esige che esso sia a tempo determinato","Sì, ma è consentito alla parti di recedere dal contratto in ogni momento","Sì, ma è consentito alle parti di recedere dal contratto dopo il decorso di cinque anni"]},{"id":1422,"area":"civ","q":"Il sig. Berlusca vanta nei confronti del sig. Senzamezzi un credito che scade al 31 dicembre 1987. Il 20 giugno il sig. Berlusca, volendo incrementare la propria attività economica e non disponendo di mezzi sufficienti, si rivolge alla \"Banca dello Sconto\", di cui è cliente, cedendo il proprio credito affinchè quest'ultima gliene anticipi l'importo. Un mese dopo aver compiuto l'operazione, il sig. Berlusca viene a sapere che il proprio debitore Senzamezzi è fallito. Tale evento, però non gli desta alcuna preoccupazione, ritenendo che, in seguito alla cessione, solo la Banca dovrà sopportare le conseguenze dell'insolvenza di Senzamezzi. Ha ragione il sig. Berlusca di sentirsi tanto tranquillo?","opts":["Sì, perché il rischio dell'insolvenza del debitore ceduto grava sul cessionario","No, perché il rischio dell'insolvenza grava sul cedente","No, perché, pur gravando il rischio dell'insolvenza sul cessionario, il cedente è tenuto al risarcimento dei danni"]},{"id":1423,"area":"civ","q":"E' valida la transazione su lite già decisa con sentenza passata in giudicato?","opts":["Sì","Solo se una della parti era a conoscenza della sentenza","Solo se entrambe le parti erano a conoscenza dell'esistenza del giudicato"]},{"id":1424,"area":"civ","q":"A norma del codice civile, nella vendita che ha per oggetto una cosa futura, qualora le parti non abbiano voluto concludere un contratto aleatorio, se la cosa non viene ad esistenza:","opts":["La vendita è annullabile","La vendita è valida, ma l'acquirente può chiederne la risoluzione e pretendere la restituzione del prezzo eventualmente pagato","La vendita è nulla"]},{"id":1425,"area":"civ","q":"Il compratore può chiedere la risoluzione del contratto se, quando l'ha concluso, ignorava che la cosa non era di proprietà del venditore?","opts":["Sì, in ogni caso","No, ma ha diritto ad un equo indennizzo","Sì, purchè frattanto il venditore non gliene abbia fatto acquistare la proprietà"]},{"id":1426,"area":"civ","q":"Tizio ha venduto a Caio una cosa, gravata da vizi facilmente riconoscibili, dichiarandola esente da vizi. In questa ipotesi il codice civile prevede che:","opts":["Tizio è tenuto alla garanzia per i vizi della cosa venduta","Tizio è tenuto alla garanzia per i vizi della cosa venduta solo se la cosa è perita in conseguenza dei vizi","Tizio è tenuto alla garanzia per i vizi della cosa venduta solo se Caio prova che non era a conoscenza dei vizi della cosa"]},{"id":1427,"area":"civ","q":"Salvo patto contrario, quando deve essere pagato il prezzo della somministrazione a carattere continuativo e non periodico?","opts":["All'atto delle singole prestazioni","Al momento dell'effettuazione della verifica periodica","Secondo le scadenze d'uso"]},{"id":1428,"area":"civ","q":"Ai sensi del codice civile, nel contratto di locazione, il locatore deve:","opts":["Eseguire durante la locazione le riparazioni di piccola manutenzione","Garantire il conduttore da ogni tipo di molestie, anche da quelle che non diminuiscono l'uso o il godimento della cosa","Mantenere la cosa locata in stato da servire all'uso convenuto"]},{"id":1429,"area":"civ","q":"A norma del codice civile, in quali casi il corrispettivo di un contratto di appalto viene determinato dal giudice?","opts":["Quando le parti non hanno determinato la misura del corrispettivo né hanno stabilito il modo di determinarla e non esistano tariffe o usi ai quali fare riferimento","Quando le parti non hanno determinato la misura del corrispettivo né hanno stabilito il modo di determinarla ancorchè esistano usi a cui fare riferimento","Solo quando le parti lo abbiano espressamente previsto"]},{"id":1430,"area":"civ","q":"Tizio si obbliga nei confronti di Caio a vendere per conto di quest'ultimo il fondo Tuscolano. In questo caso, Tizio e Caio hanno concluso un contratto di:","opts":["Associazione in partecipazione","Anticresi","Mandato"]},{"id":1431,"area":"civ","q":"Il mandato generale:","opts":["Non comprende gli atti che eccedono l'ordinaria amministrazione se non sono indicati espressamente","Comprende tutti gli atti di ordinaria e straordinaria amministrazione tranne quelli che importano alienazione di beni immobili o diritti reali immobiliari o la costituzione di garanzie reali sugli stessi","Comprende tutti gli atti di ordinaria e straordinaria amministrazione anche se non sono indicati espressamente"]},{"id":1432,"area":"civ","q":"Il mandato conferito a più persone designate ad operare congiuntamente, si estingue:","opts":["Solo se la causa di estinzione concerne tutti i mandatari","Solo se la causa di estinzione concerne tutti i mandatari, salvo patto contrario","Anche se la causa di estinzione concerne uno solo dei mandatari, salvo patto contrario"]},{"id":1433,"area":"civ","q":"Il contratto di spedizione è un mandato col quale lo spedizioniere assume l'obbligo di concludere un contratto di trasporto e di compiere le operazioni accessorie:","opts":["In nome e per conto del mandante","In nome e per conto proprio","In nome proprio e per conto del mandante"]},{"id":1434,"area":"civ","q":"Il codice civile definisce così il contratto di deposito:","opts":["Il contratto che ha per oggetto l'acquisto o la vendita di beni per conto di un soggetto ed in nome dell'incaricato","Il contratto col quale una parte riceve dall'altra una cosa mobile con l'obbligo di custodirla e di restituirla in natura","Il contratto col quale una parte consegna all'altra una cosa mobile affinchè se ne serva per un tempo o per un uso determinato, con l'obbligo di restituire la stessa cosa ricevuta"]},{"id":1435,"area":"civ","q":"Tizio e Caio concludono un contratto con il quale Tizio consegna a Caio una cosa immobile, affinchè quest'ultimo se ne serva per un tempo determinato, con l'obbligo di restituire la stessa cosa ricevuta e senza dover corrispondere alcun corrispettivo per l'uso della cosa. In questo caso, le parti hanno concluso un:","opts":["Contratto di comodato","Contratto di vendita a termine","Contratto di mandato"]},{"id":1437,"area":"civ","q":"Qualora in un contratto di mutuo oneroso sia stato convenuto che il mutuatario paghi solo quando potrà:","opts":["Il termine per il pagamento è fissato dal giudice","Si presume che il mutuatario sia obbligato alla restituzione decorso un anno dalla conclusione del contratto","Il contratto è nullo"]},{"id":1438,"area":"civ","q":"Il contratto con il quale la banca si obbliga a tenere a disposizione dell'altra parte una somma di denaro per un dato periodo di tempo o a tempo indeterminato è definito:","opts":["Anticipazione bancaria","Conto corrente bancario","Apertura di credito bancario"]},{"id":1439,"area":"civ","q":"La qualità di imprenditore si acquista:","opts":["Con l'esercizio effettivo di un'impresa","Con l'iscrizione nel registro delle imprese","Con una licenza amministrativa"]},{"id":1440,"area":"civ","q":"Gennaro Ravanello gestisce una piccola rivendita di frutta e ortaggi avvalendosi della collaborazione di due figli e di un giovane garzone. Può essere definito un piccolo imprenditore?","opts":["No, perché è piccolo imprenditore colui che esercita un'attività professionale organizzata esclusivamente con il lavoro proprio","No, perché è piccolo imprenditore solo il titolare di un'impresa artigiana","Sì, perché la sua attività professionale è organizzata prevalentemente con il lavoro proprio e dei propri familiari"]},{"id":1441,"area":"civ","q":"Quale dei seguenti elementi è comune all'impresa commerciale e all'impresa agricola?","opts":["La soggezione alle procedure concorsuali diverse dal fallimento","L'apprestamento di un'organizzazione di persone e di mezzi","L'obbligo della tenuta di scritture contabili"]},{"id":1442,"area":"civ","q":"Il sig. Granturco ha in gestione un allevamento di polli in batteria. In seguito a serie difficoltà economiche, il sig. Granturco risulta impossibilitato ad adempiere a tutti i suoi debiti. A questo punto il sig. Rapace, creditore del sig. Granturco, insoddisfatto dei suoi crediti, annuncia che farà istanza di falllimento. Che cosa succederà, in tale ipotesi?","opts":["L'istanza non è ammissibile, poiché il creditore (il sig.Rapace) deve provare a soddisfarsi aggredendo prima i beni personali del suo debitore (il sig. Granturco)","L'istanza verrà respinta: il sig. Granturco (debitore), benchè insolvente, è imprenditore agricolo, ed in quanto tale, non è sottoponibile alle procedure fallimentari","L'istanza potrà essere accolta, poiché l'attività di allevamento in batteria è considerata impresa commerciale"]},{"id":1443,"area":"civ","q":"Quale fra queste non è un'attività imprenditoriale?","opts":["L'attività di trasporto","L'attività bancaria","L'attività del libero professionista"]},{"id":1445,"area":"civ","q":"Friz prende in locazione un capannone da utilizzare come deposito della propria industria di materiale da costruzione. Rientra tale capannone nell'azienda di Friz?","opts":["No, perché non è di sua proprietà","Sì, perché fa parte del complesso di beni organizzati per l'esercizio dell'impresa","No, perché l'azienda è un'universalità di beni mobili"]},{"id":1446,"area":"civ","q":"In caso di cessione dell'azienda, il cedente è liberato dei debiti inerenti all'attività aziendale sorti anteriormente al trasferimento:","opts":["Sempre","Solo se la cessione è iscritta nel registro delle imprese","Solo se i creditori vi hanno consentito"]},{"id":1447,"area":"civ","q":"In caso di trasferimento dell'azienda il divieto di concorrenza a carico dell'alienante:","opts":["E' previsto dalla legge","Non è previsto ma può essere pattuito dalle parti","E' vietato dalla legge"]},{"id":1448,"area":"civ","q":"L'obbligo di gestire l'azienda senza modificare la destinazione e in modo da conservare l'efficienza dell'organizzazione e degli impianti è stabilito:","opts":["Solo nel caso di usufrutto","Solo in caso di affitto","Per l'usufrutto e l'affitto"]},{"id":1449,"area":"civ","q":"Chi ha fatto uso per primo di un marchio non registrato ha la facoltà di continuare ad usarne nonostante la registrazione da altri ottenuta?","opts":["No","Sì, ma solo nei limiti in cui anteriormente se ne è valso","Sì, ma solo indennizzando colui che ha provveduto alla registrazione del marchio"]},{"id":1450,"area":"civ","q":"Il segno distintivo dei locali nei quali si esercita l'impresa è:","opts":["La ditta","L'insegna","Il marchio di fabbrica"]},{"id":1451,"area":"civ","q":"Quale delle seguenti non è una società di persone?","opts":["Società a responsabilità limitata","Società in nome collettivo","Società in accomandita semplice"]},{"id":1452,"area":"civ","q":"Quale tipo di società non può essere adottata per l'esercizio di un'at da parte di un notaio o un pubblico ufficiale, conferendo al contratto un valore legale superiore. Si dicono formali, o solenni, quei contratti per cui la legge richiede un determinato requisito di forma. A forma libera gli altri. La forma scritta è obbligatoria in alcune circostanze e per specifici tipi di contratti, come ad esempio:","a":"civ"},{"n":382,"q":"CHI HA IN MANO IL BENE IPOTECATO?","a":"civ"},{"n":383,"q":"QUALI SONO I GRADI DELL' IPOTECA?","a":"civ"},{"n":384,"q":"QUALI SONO LE CAUSE DI ANNULLABILITÁ DEL CONTRATTO?","a":"civ"},{"n":385,"q":"DIFFERENZA TRA NULLITÀ E ANNULLABILITÀ La nullità e l'annullabilità sono due concetti giuridici fondamentali che riguardano la validità di un contratto, ma presentano differenze significative che è utile comprendere. La nullità si verifica quando un contratto è considerato completamente privo di effetti giuridici fin dal momento in cui viene stipulato. In sostanza, un contratto nullo non produce alcun effetto legale, come se non fosse mai esistito. Le cause di nullità possono includere vari fattori, come la presenza di un oggetto illecito, una causa illegittima, o la mancanza di elementi essenziali, quali l'accordo tra le parti o un oggetto lecito. Un aspetto importante della nullità è che chiunque possa dimostrare l'inesistenza del contratto ha il diritto di farne dichiarare la nullità, e il giudice può anche intervenire d'ufficio per riconoscerla. Inoltre, non ci sono limiti di tempo per contestare un contratto nullo, il che lo rende inoppugnabile. L'annullabilità si riferisce a contratti che, pur essendo validi e producendo effetti giuridici, possono essere invalidati a causa di vizi del consenso o altre irregolarità. A differenza della nullità, un contratto annullabile rimane valido fino a quando non viene formalmente annullato. Le cause comuni di annullabilità includono errori, dolo (inganno), coazione (costrizione) e incapacità delle parti. Un contratto annullabile continua a produrre effetti finché non viene richiesta l'annullamento, e chi desidera annullare il contratto deve farlo entro un termine specifico noto come termine di decadenza. Solo le parti interessate possono richiedere l'annullamento, e questo deve avvenire entro i tempi previsti dalla legge.","a":"civ"},{"n":386,"q":"SPIEGARE TUTTI I TIPI DI CONTRATTI DI LOCAZIONE E LE LORO DIFFERENZE","a":"civ"},{"n":387,"q":"SUCCESSIONE E DONAZIONE La successione e la donazione sono due modalità principali di trasferimento dei beni. La successione avviene quando una persona muore (il de cuius) e i suoi beni vengono trasferiti agli eredi. Ci sono due tipologie di successione:","a":"gen"},{"n":388,"q":"USUFRUTTO E NUDA PROPRIETÀ","a":"civ"},{"n":389,"q":"COSA ACCADE QUANDO DECEDE UNO DEI SOGGETTI INTERESSATI NELLA COMPRAVENDITA? QUALI SONO E COSA SONO I DIRITTI REALI DI GODIMENTO? Quando uno dei soggetti in una compravendita muore, le conseguenze legali variano a seconda di chi è deceduto.","a":"civ"},{"n":390,"q":"COS'È L'USUFRUTTO? L’usufrutto è un diritto reale di godimento che consente a una persona, chiamata usufruttuario, di utilizzare e godere di un bene che in realtà appartiene a un’altra persona, nota come nudo proprietario. L’usufrutto permette all'usufruttuario di trarre vantaggio dal bene, sia attraverso il suo utilizzo diretto che mediante i frutti che questo produce. Questi frutti possono essere di natura naturale, come il raccolto di un campo o i frutti di un albero, oppure civili, come il canone d’affitto derivante dalla locazione di un immobile. Una delle caratteristiche principali dell'usufrutto è la sua natura temporanea. Questo diritto viene generalmente stabilito per un periodo determinato o, molto frequentemente, per la vita dell'usufruttuario. Alla scadenza di questo termine o al momento della morte dell'usufruttuario, il diritto si estingue e il bene torna nella piena disponibilità del nudo proprietario. L'usufruttuario ha quindi la possibilità di utilizzare il bene a proprio piacimento. Può vivere in un immobile, affittarlo per generare reddito o utilizzarlo per scopi produttivi. Tuttavia, questa facoltà viene accompagnata da alcune responsabilità: l'usufruttuario è obbligato a mantenere il bene in buono stato e a fare le necessarie riparazioni ordinarie. È importante notare che l’usufruttuario non può modificare la destinazione d’uso del bene o compiere atti che possano comprometterne il valore senza il consenso del nudo proprietario. Ad esempio, non può apportare modifiche strutturali all’immobile senza autorizzazione. L’usufrutto può essere costituito tramite un testamento oppure attraverso un contratto formale stipulato tra le parti. In alcune situazioni, la legge stessa può sancire la creazione di un usufrutto, ad esempio in caso di successione. Ci sono diversi motivi per cui l'usufrutto può estinguersi :","a":"trib"},{"n":391,"q":"COS'È L'USO COSA SONO I \"VIZI DI VOLONTA'? FARE ESEMPI","a":"gen"},{"n":392,"q":"QUALI SONO GLI OBBLIGHI DELL'USUFRUTTUARIO?","a":"gen"},{"n":393,"q":"COS'È L'INVENTARIO NELL'USUFRUTTO?","a":"civ"},{"n":394,"q":"DEFINIZIONE DI USUFRUTTO E SPIEGAZIONE DEI","a":"civ"},{"n":395,"q":"SERVITÚ DA ELETTRODOTTO","a":"gen"},{"n":396,"q":"CALCOLO INDENNIZZI E COSTI Il calcolo di indennizzi e costi relativi alla servitù da elettrodo può essere complesso e varia in base alle circostanze specifiche.","a":"civ"},{"n":397,"q":"SERVITÚ","a":"gen"},{"n":398,"q":"AREE DI RISPETTO","a":"gen"},{"n":399,"q":"SERVITÙ PREDIALE","a":"civ"},{"n":400,"q":"NOTE DI TRASCRIZIONE DI ATTO DI COMPRAVENDITA","a":"civ"},{"n":401,"q":"TRASCRIZIONE","a":"gen"},{"n":402,"q":"PRESCRIZIONE La prescrizione per gli atti immobiliari riguarda il processo attraverso il quale il possesso di un bene immobile, esercitato in modo continuativo e pacifico, può trasformarsi nel diritto di proprietà, estinguendo quindi eventuali diritti di proprietà di terzi. ● Prescrizione Ordinaria: Per acquisire la proprietà di un immobile, il termine di prescrizione è di 20 anni. Il poss 3) Cita la norma/articolo rilevante quando utile (es. L.39/1989, art. 1754 c.c. mediatore, art. 1755 provvigione) ma senza inventare numeri: se non sei sicuro, dillo.
4) Termina SEMPRE con UNA domanda d'esame in stile quiz a risposta multipla (a/b/c), poi aspetta la risposta dello studente.
5) Quando lo studente risponde, di' se è giusto o sbagliato, spiega brevemente il perché (italiano + chiave cinese), e passa al punto successivo o approfondisci il punto debole.
Adatta il ritmo: se lo studente capisce, vai avanti; se sbaglia, rispiega più semplice. Correggi anche gli errori di italiano dello studente (campo corrections), perché deve scrivere/parlare correttamente all'esame.
IMPORTANT — do NOT reproduce any copyrighted textbook or the official quiz database verbatim; teach from the public exam syllabus and write ORIGINAL example questions.
Put key exam terms (it + zh) into the "vocab" field so they enter the vocabulary trainer.
SOURCE PRIORITY — VERY IMPORTANT: gli "APPUNTI DEL CORSO" eventualmente forniti qui sotto sono appunti presi da uno STUDENTE: NON sono fonte autorevole. Usali SOLO come traccia per ricordare quali punti sono stati trattati a lezione e con quale taglio. La spiegazione e le risposte corrette devono basarsi SEMPRE sulle FONTI AUTOREVOLI: il testo di legge (codice civile, L.39/1989, D.M.300/1990, T.U. edilizia 380/2001, normativa fiscale vigente), il programma e i quiz ufficiali. Se gli appunti contengono un errore, un'imprecisione o informazioni superate, segnalalo chiaramente allo studente e fornisci la versione corretta secondo la norma. In caso di dubbio o di numeri di articolo incerti, dillo invece di affidarti agli appunti.`;
  }

  return `You are "Marco", a warm, encouraging NATIVE Italian tutor and conversation partner.
The student is a Chinese native speaker at CEFR ${S.cefr}, aiming for fluent ${S.target}.

LANGUAGE: Speak Italian by default, calibrated slightly above ${S.cefr} (i+1). Use Chinese ONLY to briefly explain a grammar point on request, or to unblock the student. Never use English unless asked.

STYLE: Be a real partner — ask follow-ups, share opinions, keep dialogue alive. 2–4 sentences per turn. Always end with something that invites a reply.

${modeInstr}

ADAPT TO WEAKNESSES — weak skills: ${weakS}; weak verbs: ${weakV}; vocab due for review (reuse them naturally): ${due}. Create contexts forcing these targets without announcing it. If the student does well, raise difficulty/register; if they struggle, slow down, scaffold, model the form, then re-elicit once.

CORRECTION: Praise specifically what was good. Frame mistakes as progress, never shame.

OUTPUT FORMAT — VERY IMPORTANT. Respond with your natural Italian reply, then on a new line exactly "===META===", then a single-line minified JSON object:
{"corrections":[{"original":"...","fixed":"...","why":"中文简短解释"}],"errors":["grammar:congiuntivo","verb:fare:imperfetto"],"suggestions":["可选回复1","可选回复2"],"vocab":[{"it":"parola","zh":"中文"}],"difficulty":"too_easy|ok|too_hard","cefr":"B1+"}
Rules: corrections only for the student's latest message (empty array if none). suggestions = 2 short example replies the student could send next (in Italian), varying difficulty. vocab = 0–2 useful new words you used. Output nothing after the JSON.`;
}

/* ============================ API ============================ */
async function callClaude(userText){
  if(!S.apiKey){openSettings(true);return null;}
  history.push({role:'user',content:userText});
  const body={
    model:S.model, max_tokens:1500, system:buildSystem(),
    messages:history.map(m=>({role:m.role,content:m.content}))
  };
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'content-type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify(body)
  });
  if(!res.ok){const t=await res.text();throw new Error('API '+res.status+': '+t.slice(0,200));}
  const data=await res.json();
  const text=(data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('');
  history.push({role:'assistant',content:text});
  return text;
}
function parseReply(raw){
  const i=raw.indexOf('===META===');
  let reply=raw, meta={};
  if(i>=0){reply=raw.slice(0,i).trim();let j=raw.slice(i+10).trim();j=j.replace(/^```json|```$/g,'').trim();try{meta=JSON.parse(j)}catch(e){}}
  return {reply,meta};
}

/* ============================ RENDER CHAT ============================ */
const chat=document.getElementById('chat');
function renderRich(text){
  let s=escapeHtml(text);
  // markdown: **bold**, *italic*
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g,'<em>$1</em>');
  // line breaks
  s=s.replace(/\n/g,'<br>');
  // wrap clickable words, but skip HTML tags and entities so we don't corrupt them
  return s.replace(/(<[^>]+>|&[a-zA-Z]+;|&#\d+;)|([A-Za-zÀ-ÿ']+)/g,(m,skip,word)=>skip?skip:('<w>'+word+'</w>'));
}
function addAI(reply,meta){
  const m=document.createElement('div');m.className='msg ai';
  const b=document.createElement('div');b.className='bubble';b.innerHTML=renderRich(reply);
  const row=document.createElement('div');row.className='row';
  const tts=document.createElement('button');tts.className='tts';tts.textContent='🔊';tts.onclick=()=>speak(reply);
  row.appendChild(tts);
  m.appendChild(b);m.appendChild(row);
  if(meta.suggestions&&meta.suggestions.length){
    const s=document.createElement('div');s.className='suggests';
    meta.suggestions.slice(0,3).forEach(t=>{const c=document.createElement('button');c.className='sg';c.textContent=t;c.onclick=()=>{document.getElementById('input').value=t;autosize();};s.appendChild(c);});
    m.appendChild(s);
  }
  chat.appendChild(m);
  b.querySelectorAll('w').forEach(w=>w.onclick=e=>defineWord(w.textContent,e));
  scrollDown();
  if(S.autoplay)speak(reply);
}
function addMe(text,meta){
  const m=document.createElement('div');m.className='msg me';
  const b=document.createElement('div');b.className='bubble';b.textContent=text;m.appendChild(b);
  if(meta&&meta.corrections&&meta.corrections.length){
    meta.corrections.forEach(c=>{
      const d=document.createElement('div');d.className='correction';
      d.innerHTML=`<span class="x">${escapeHtml(c.original||'')}</span> → <span class="v">${escapeHtml(c.fixed||'')}</span><span class="why">${escapeHtml(c.why||'')}</span>`;
      m.appendChild(d);
    });
  }
  chat.appendChild(m);scrollDown();
}
function showTyping(){const t=document.createElement('div');t.className='msg ai';t.id='typing';t.innerHTML='<div class="bubble typing"><span></span><span></span><span></span></div>';chat.appendChild(t);scrollDown();}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove();}
function scrollDown(){chat.scrollTop=chat.scrollHeight;}
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ============================ SEND FLOW ============================ */
const input=document.getElementById('input'),sendBtn=document.getElementById('sendBtn');
function autosize(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px';}
input.addEventListener('input',autosize);
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}});
sendBtn.onclick=doSend;

async function doSend(){
  const text=input.value.trim();if(!text)return;
  if(!S.apiKey){openSettings(true);return;}
  input.value='';autosize();
  const meDiv={text};addMe(text,null);
  showTyping();sendBtn.disabled=true;
  try{
    const raw=await callClaude(text);hideTyping();
    if(raw===null){sendBtn.disabled=false;return;}
    const {reply,meta}=parseReply(raw);
    // attach corrections to the last "me" bubble
    if(meta.corrections&&meta.corrections.length){
      const last=[...chat.querySelectorAll('.msg.me')].pop();
      meta.corrections.forEach(c=>{const d=document.createElement('div');d.className='correction';d.innerHTML=`<span class="x">${escapeHtml(c.original||'')}</span> → <span class="v">${escapeHtml(c.fixed||'')}</span><span class="why">${escapeHtml(c.why||'')}</span>`;last.appendChild(d);});
      scrollDown();
    }
    addAI(reply,meta);
    updateProfile(meta);
    bumpStreak();
  }catch(err){hideTyping();addAI('⚠️ '+err.message+'\n\n(请检查设置里的 API key / 模型名 / 网络。)',{});}
  sendBtn.disabled=false;
}

/* ============================ ADAPTIVE PROFILE ============================ */
function updateProfile(meta){
  (meta.errors||[]).forEach(e=>{
    if(e.startsWith('verb:')){const v=e.split(':')[1];if(v)S.profile.weak_verbs[v]=(S.profile.weak_verbs[v]||0)+1;}
    else{const k=e.replace(/^grammar:/,'');S.profile.weak_skills[k]=(S.profile.weak_skills[k]||0)+1;}
  });
  // vocab from AI
  (meta.vocab||[]).forEach(v=>{if(v.it&&!S.vocab.find(x=>x.it.toLowerCase()===v.it.toLowerCase()))S.vocab.push({it:v.it,zh:v.zh||'',strength:0,due:Date.now(),added:Date.now()});});
  // cefr drift
  if(meta.difficulty==='too_easy')S.cefrPct=Math.min(1,S.cefrPct+0.012);
  if(meta.difficulty==='too_hard')S.cefrPct=Math.max(0,S.cefrPct-0.006);
  if(meta.difficulty==='ok')S.cefrPct=Math.min(1,S.cefrPct+0.004);
  applyCefr();save();renderRing();
}
const LEVELS=['A2','B1','B1+','B2','B2+','C1'];
function applyCefr(){const idx=Math.min(LEVELS.length-1,Math.floor(S.cefrPct*LEVELS.length));S.cefr=LEVELS[idx];}
function renderRing(){
  const dash=107,off=dash*(1-S.cefrPct);
  document.getElementById('ringFill').setAttribute('stroke-dashoffset',off);
  document.getElementById('ringLvl').textContent=S.cefr.replace('+','');
}

/* ============================ STREAK ============================ */
function bumpStreak(){
  const today=new Date().toISOString().slice(0,10);
  if(S.lastDay===today)return;
  const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
  S.streak=(S.lastDay===y)?S.streak+1:1;S.lastDay=today;save();
  document.getElementById('streakN').textContent=S.streak;
}

/* ============================ WORD DEFINE ============================ */
const pop=document.getElementById('pop');
async function defineWord(word,ev){
  word=word.replace(/[^A-Za-zÀ-ÿ']/g,'');if(!word)return;
  pop.innerHTML='<b>'+escapeHtml(word)+'</b><div style="margin-top:6px;color:var(--text-soft)">查询中…</div>';
  positionPop(ev);pop.classList.add('show');
  if(!S.apiKey){pop.innerHTML='<b>'+word+'</b><div class="ex">请先在设置里填入 API key</div>';return;}
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'content-type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:S.model,max_tokens:300,system:'You are an Italian-Chinese dictionary. Return ONLY minified JSON.',messages:[{role:'user',content:`Italian word "${word}". JSON: {"base":"原形/词典形","pos":"词性(it)","zh":"中文释义","ex":"一个简短意大利语例句"}`}]})});
    const d=await res.json();let t=(d.content||[]).map(c=>c.text).join('').replace(/^```json|```$/g,'').trim();
    const o=JSON.parse(t);
    pop.innerHTML=`<b>${escapeHtml(o.base||word)}</b><span class="pos">${escapeHtml(o.pos||'')}</span><div style="margin-top:5px">${escapeHtml(o.zh||'')}</div><span class="ex">"${escapeHtml(o.ex||'')}"</span><button class="add" id="addV">＋ 加入词汇训练</button>`;
    document.getElementById('addV').onclick=()=>{if(!S.vocab.find(x=>x.it.toLowerCase()===(o.base||word).toLowerCase())){S.vocab.push({it:o.base||word,zh:o.zh||'',strength:0,due:Date.now(),added:Date.now()});save();}pop.classList.remove('show');};
  }catch(e){pop.innerHTML='<b>'+escapeHtml(word)+'</b><div class="ex">查询失败</div>';}
}
function positionPop(ev){const r=document.querySelector('.app').getBoundingClientRect();let x=ev.clientX-r.left,y=ev.clientY-r.top+14;x=Math.min(Math.max(8,x-130),r.width-270);pop.style.left=x+'px';pop.style.top=y+'px';}
document.addEventListener('click',e=>{if(!pop.contains(e.target)&&e.target.tagName!=='W')pop.classList.remove('show');});

/* ============================ TTS / STT ============================ */
function speak(t){if(!('speechSynthesis'in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='it-IT';u.rate=0.95;const v=speechSynthesis.getVoices().find(x=>x.lang.startsWith('it'));if(v)u.voice=v;speechSynthesis.speak(u);}
const micBtn=document.getElementById('micBtn');let recog;
if('webkitSpeechRecognition'in window||'SpeechRecognition'in window){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;recog=new SR();recog.lang='it-IT';recog.interimResults=false;
  recog.onresult=e=>{input.value=e.results[0][0].transcript;autosize();};
  recog.onend=()=>micBtn.classList.remove('rec');
  micBtn.onclick=()=>{if(micBtn.classList.contains('rec')){recog.stop();}else{micBtn.classList.add('rec');try{recog.start()}catch(e){}}};
}else{micBtn.onclick=()=>alert('当前浏览器不支持语音输入，建议用 Chrome。');}

  reBarHtml(`${srcLabel()} · ${curRe.n?'第 '+curRe.n+' 题':'随机'}`,'➡️ 下一题','reNext');
  sendHidden(`(DOMANDA D'ESAME${curRe.n?' n.'+curRe.n:''}: "${curRe.q}")`);
  setTimeout(()=>{const b=document.getElementById('reNext');if(b)b.onclick=nextReQuiz;},50);
}
function startReExam(area){
  reSrc='student';reInit('exam',area);
  reExam={total:10,done:0,area};
  const an=RE_AREAS.find(a=>a[0]===area)[1];
  banner(`口试模拟考 · <b style="cursor:default">${an}</b> · 共 10 题。答完每题点「下一题」。`);
  nextReExam();
}
function startMilanExam(area){
  reSrc='milan';reInit('exam',area);
  reExam={total:10,done:0,area};
  const an=MILAN_AREAS.find(a=>a[0]===area)[1];
  banner(`🇮🇹 米兰官方模拟考 · <b style="cursor:default">${an}</b> · 共 10 题。`);
  nextReExam();
}
function nextReExam(){
  if(!reExam)return;
  reExam.done++;
  if(reExam.done>reExam.total){
    reBarHtml('📝 模拟考结束 · 正在生成复盘…','');
    sendHidden(`(L'esame simulato è terminato (10 domande). Fai ora un RIEPILOGO FINALE in italiano con chiave cinese: punti di forza, errori principali da rivedere, e un voto indicativo su 10. Poi invita lo studente a continuare.)`);
    reExam=null;S.reMode='';save();
    setTimeout(clearReBar,1500);return;
  }
  curRe=pickRe(reExam.area);
  reBarHtml(`📝 ${reSrc==='milan'?'米兰官方':''}模拟考 · ${reExam.done}/${reExam.total} 题`, reExam.done<reExam.total?'➡️ 下一题':'🏁 结束并复盘','reNext');
  sendHidden(`(DOMANDA D'ESAME${curRe.n?' n.'+curRe.n:''}, simulazione ${reExam.done}/${reExam.total}: "${curRe.q}")`);
  setTimeout(()=>{const b=document.getElementById('reNext');if(b)b.onclick=nextReExam;},50);
}

/* ---------- 笔试模拟 (official written-exam MCQ) ---------- */
let curW=null, wStats=null;
function startWritten(area){
  reExam=null;reInit('written',area);
  wStats={done:0,correct:0};
  banner('✍️ 笔试模拟 · 官方民法选择题。选 A/B/C 作答，系统自动判分讲解。');
  nextWritten();
}
function nextWritten(){
  const pool=(window.WRITTEN_BANK||[]).filter(x=>x.area===S.reArea);
  if(!pool.length){addAI('未载入该部分题库。',{});return;}
  curW=pool[Math.floor(Math.random()*pool.length)];
  reBarHtml(`✍️ 笔试 · 已答 ${wStats.done} · 正确 ${wStats.correct}`,'',null);
  // render question + options as an AI bubble (no API call)
  const m=document.createElement('div');m.className='msg ai';
  const b=document.createElement('div');b.className='bubble';
  b.innerHTML=`<strong>Domanda n.${curW.id}</strong><br>${renderRich(curW.q)}`;
  m.appendChild(b);
  const s=document.createElement('div');s.className='suggests';
  ['A','B','C'].forEach((L,i)=>{const c=document.createElement('button');c.className='sg';c.style.textAlign='left';c.innerHTML=`<b>${L}.</b> ${escapeHtml(curW.opts[i])}`;c.onclick=()=>submitWritten(i,m);s.appendChild(c);});
  m.appendChild(s);chat.appendChild(m);
  b.querySelectorAll('w').forEach(w=>w.onclick=e=>defineWord(w.textContent,e));
  scrollDown();
}
async function submitWritten(i,qDiv){
  // lock options
  const sgs=qDiv.querySelectorAll('.sg');sgs.forEach(x=>x.onclick=null);
  if(sgs[i])sgs[i].style.background='var(--accent-soft)';
  addMe(`${['A','B','C'][i]}. ${curW.opts[i]}`,null);
  wStats.done++;
  const prompt=`(DOMANDA SCRITTA UFFICIALE n.${curW.id}: "${curW.q}"\nOpzioni: 1) ${curW.opts[0]} | 2) ${curW.opts[1]} | 3) ${curW.opts[2]}\nLo studente ha scelto l'opzione ${i+1}. Indica qual è corretta e spiega.)`;
  showTyping();
  try{
    const raw=await callClaude(prompt);hideTyping();if(raw===null)return;
    const {reply,meta}=parseReply(raw);
    addAI(reply,meta);updateProfile(meta);bumpStreak();
    // detect correctness for tally
    const mt=reply.match(/opzione\s*([123])/i);
    if(mt && (+mt[1])===(i+1)) wStats.correct++;
    reBarHtml(`✍️ 笔试 · 已答 ${wStats.done} · 正确 ${wStats.correct}`,'➡️ 下一题','wNext');
    setTimeout(()=>{const b=document.getElementById('wNext');if(b)b.onclick=nextWritten;},50);
  }catch(e){hideTyping();addAI('⚠️ '+e.message,{});}
}

/* ============================ SHEETS ============================ */
const overlay=document.getElementById('overlay'),sheet=document.getElementById('sheet');
function openSheet(html){sheet.innerHTML=html;overlay.classList.add('show');}
function closeSheet(){overlay.classList.remove('show');}
overlay.onclick=e=>{if(e.target===overlay)closeSheet();};

function chooseFrom(title,list,cb){
  openSheet(`<h2>${title}</h2><div class="sub">选一个开始针对性练习</div><div class="opts">${list.map((x,i)=>`<div class="opt" data-i="${i}">${x}</div>`).join('')}</div>`);
  sheet.querySelectorAll('.opt').forEach(o=>o.onclick=()=>{closeSheet();cb(list[+o.dataset.i]);});
}
function openSettings(force){
  openSheet(`<h2>设置</h2><div class="sub">数据只保存在你这台设备的浏览器里。</div>
  <div class="field"><label>Claude API Key</label><input id="ak" type="password" placeholder="sk-ant-..." value="${escapeHtml(S.apiKey)}"><div class="help">在 console.anthropic.com 获取。密钥仅存于本地浏览器，直接从你的浏览器调用 Anthropic，不经过任何服务器。</div></div>
  <div class="field"><label>模型</label><select id="mdl">
    <option value="claude-sonnet-4-6"${S.model==='claude-sonnet-4-6'?' selected':''}>Claude Sonnet 4.6（推荐·均衡）</option>
    <option value="claude-opus-4-8"${S.model==='claude-opus-4-8'?' selected':''}>Claude Opus 4.8（最强·较贵）</option>
    <option value="claude-haiku-4-5-20251001"${S.model==='claude-haiku-4-5-20251001'?' selected':''}>Claude Haiku 4.5（最快·最省）</option>
  </select></div>
  <div class="field"><label>目标等级</label><select id="tg">
    ${['B2','B2+','C1'].map(l=>`<option${S.target===l?' selected':''}>${l}</option>`).join('')}
  </select></div>
  <div class="field"><label><input type="checkbox" id="ap" ${S.autoplay?'checked':''} style="width:auto;margin-right:6px">自动朗读导师消息</label></div>
  <button class="btn" id="saveSet">保存</button>
  ${force?'':'<button class="btn ghost" id="closeSet" style="margin-top:8px">关闭</button>'}`);
  document.getElementById('saveSet').onclick=()=>{S.apiKey=document.getElementById('ak').value.trim();S.model=document.getElementById('mdl').value;S.target=document.getElementById('tg').value;S.autoplay=document.getElementById('ap').checked;save();closeSheet();if(!chat.children.length)kickoff();};
  const cs=document.getElementById('closeSet');if(cs)cs.onclick=closeSheet;
}
function openVocab(){
  const due=S.vocab.filter(v=>v.due<=Date.now()).length;
  openSheet(`<h2>词汇训练 📚</h2><div class="sub">点导师消息里的单词即可收藏</div>
  <div class="stat"><div class="c"><b>${S.vocab.length}</b><span>已收藏</span></div><div class="c"><b>${due}</b><span>待复习</span></div><div class="c"><b>${S.cefr}</b><span>当前等级</span></div></div>
  ${S.vocab.length?S.vocab.slice().reverse().map(v=>`<div class="vocab-item"><div><b>${escapeHtml(v.it)}</b> <span class="zh">${escapeHtml(v.zh)}</span></div><span class="zh">${'●'.repeat(Math.min(5,v.strength))||'新'}</span></div>`).join(''):'<div class="empty">还没有收藏的词。<br>在聊天里点任意意大利语单词试试。</div>'}
  ${S.vocab.length?'<button class="btn ghost" id="clrV" style="margin-top:14px">清空词汇</button>':''}`);
  const c=document.getElementById('clrV');if(c)c.onclick=()=>{if(confirm('确定清空所有收藏词？')){S.vocab=[];save();openVocab();}};
}
function openProgress(){
  const ws=Object.entries(S.profile.weak_skills).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const wv=Object.entries(S.profile.weak_verbs).sort((a,b)=>b[1]-a[1]).slice(0,6);
  openSheet(`<h2>学习进度 📈</h2><div class="sub">B1 → ${S.target} 路径</div>
  <div class="stat"><div class="c"><b>${S.cefr}</b><span>CEFR 估计</span></div><div class="c"><b>${Math.round(S.cefrPct*100)}%</b><span>进度</span></div><div class="c"><b>🔥 ${S.streak}</b><span>连续天数</span></div></div>
  <div class="field"><label>最需加强的语法点</label>${ws.length?'<div class="recap-list"><ul>'+ws.map(x=>`<li>${escapeHtml(x[0])} <span class="zh">(${x[1]}次)</span></li>`).join('')+'</ul></div>':'<div class="help">多聊几句，系统会自动诊断。</div>'}</div>
  <div class="field"><label>易错动词</label>${wv.length?'<div class="recap-list"><ul>'+wv.map(x=>`<li>${escapeHtml(x[0])} <span class="zh">(${x[1]}次)</span></li>`).join('')+'</ul></div>':'<div class="help">暂无数据。</div>'}</div>
  <button class="btn ghost" id="rst" style="margin-top:8px">重置全部学习数据</button>`);
  document.getElementById('rst').onclick=()=>{if(confirm('确定重置所有数据（含词汇、进度、密钥）？')){localStorage.removeItem(LS);location.reload();}};
}

/* ============================ HEADER BTNS ============================ */
document.getElementById('setBtn').onclick=()=>openSettings(false);
document.getElementById('ringBtn').onclick=openProgress;
document.getElementById('streakBtn').onclick=openProgress;
document.getElementById('themeBtn').onclick=()=>{S.theme=S.theme==='dark'?'light':'dark';applyTheme();save();};
function applyTheme(){document.documentElement.setAttribute('data-theme',S.theme);document.getElementById('themeBtn').textContent=S.theme==='dark'?'☀️':'🌙';}

// vocab quick access: long-press ring? add a chip
const vocabChip=document.createElement('button');vocabChip.className='chip';vocabChip.textContent='📖 我的词汇';vocabChip.onclick=openVocab;

/* ============================ BANNER ============================ */
function banner(html){const w=document.getElementById('bannerWrap');w.innerHTML=`<div class="banner">✨ <div>${html}</div></div>`;setTimeout(()=>{if(w.firstChild)w.firstChild.style.transition='opacity .5s';},10);}

/* ============================ INIT ============================ */
function init(){
  applyTheme();applyCefr();renderRing();renderModes();
  modebar.appendChild(vocabChip);
  document.getElementById('streakN').textContent=S.streak;
  if(!S.apiKey){
    banner('欢迎使用 Parla！请先点右上角 <b id="bset">⚙️ 设置</b> 填入你的 Claude API key，就能开始用意大利语聊天了。');
    setTimeout(()=>{const b=document.getElementById('bset');if(b)b.onclick=()=>openSettings(false);},50);
    openSettings(true);
  }else{
    kickoff();
  }
}
if(speechSynthesis)speechSynthesis.onvoiceschanged=()=>{};
init();

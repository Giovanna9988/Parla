<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Parla · 意大利语进阶导师</title>
<style>
:root{
  --bg:#f6f5f2; --surface:#ffffff; --surface-2:#f0eee9; --text:#1c1b19; --text-soft:#6b6864;
  --line:#e6e3dd; --accent:#d96a3f; --accent-soft:#fbe9e0; --accent-2:#2f6f8f;
  --ok:#3a9d6b; --warn:#d98e2b; --bubble-me:#d96a3f; --bubble-me-text:#fff;
  --bubble-ai:#ffffff; --shadow:0 6px 24px rgba(40,30,20,.08); --radius:20px;
  --font:'Inter','SF Pro Display','Manrope',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
}
[data-theme="dark"]{
  --bg:#16151a; --surface:#1f1e25; --surface-2:#26242d; --text:#f1efe9; --text-soft:#9b988f;
  --line:#2e2c36; --accent:#e8794d; --accent-soft:#39281f; --accent-2:#5aa6c8;
  --bubble-ai:#26242d; --shadow:0 6px 28px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;justify-content:center;overflow:hidden}
.app{width:100%;max-width:100%;height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--bg)}
/* 桌面端铺满屏幕，但正文列居中保持可读 */
.modebar,#bannerWrap,#reBar,.chat{width:100%;max-width:900px;margin-left:auto;margin-right:auto}
.composer .cbox{max-width:900px;margin-left:auto;margin-right:auto}
header{max-width:100%}

/* ---------- Header ---------- */
header{
  display:flex;align-items:center;gap:12px;padding:12px 16px;background:color-mix(in srgb,var(--surface) 80%,transparent);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:20
}
.brand{font-weight:800;font-size:18px;letter-spacing:-.5px;display:flex;align-items:center;gap:7px}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
.h-spacer{flex:1}
.ring{position:relative;width:42px;height:42px;cursor:pointer}
.ring svg{transform:rotate(-90deg)}
.ring .lvl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.streak{display:flex;align-items:center;gap:4px;font-weight:700;font-size:14px;background:var(--surface-2);padding:6px 10px;border-radius:14px;cursor:pointer}
.icon-btn{width:38px;height:38px;border:none;background:var(--surface-2);border-radius:12px;cursor:pointer;font-size:17px;color:var(--text);display:flex;align-items:center;justify-content:center;transition:.15s}
.icon-btn:hover{background:var(--line)}

/* ---------- Mode bar ---------- */
.modebar{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--line);background:var(--surface)}
.modebar::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;border:1px solid var(--line);background:var(--surface);color:var(--text-soft);padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px var(--accent-soft)}
.chip:not(.active):hover{border-color:var(--accent)}

/* ---------- Chat ---------- */
.chat{flex:1;overflow-y:auto;padding:18px 16px 8px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.msg{max-width:86%;display:flex;flex-direction:column;gap:6px;animation:rise .35s ease}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.msg.ai{align-self:flex-start}
.msg.me{align-self:flex-end;align-items:flex-end}
.bubble{padding:12px 15px;border-radius:var(--radius);font-size:15.5px;line-height:1.55;word-wrap:break-word;box-shadow:var(--shadow)}
.ai .bubble{background:var(--bubble-ai);border-bottom-left-radius:6px}
.me .bubble{background:var(--bubble-me);color:var(--bubble-me-text);border-bottom-right-radius:6px}
.ai .bubble w{cursor:pointer;border-bottom:1.5px dotted transparent;transition:.12s}
.ai .bubble w:hover{border-bottom-color:var(--accent);color:var(--accent)}
.row{display:flex;align-items:center;gap:8px}
.tts{border:none;background:var(--surface-2);color:var(--text-soft);width:28px;height:28px;border-radius:9px;cursor:pointer;font-size:13px}
.suggests{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
.sg{font-size:13px;background:var(--surface);border:1px dashed var(--accent);color:var(--accent);padding:7px 11px;border-radius:13px;cursor:pointer;transition:.15s}
.sg:hover{background:var(--accent-soft)}
.correction{background:var(--accent-soft);border-left:3px solid var(--accent);border-radius:10px;padding:9px 12px;font-size:13px;line-height:1.5;margin-top:2px}
.correction .x{color:var(--text-soft);text-decoration:line-through}
.correction .v{color:var(--ok);font-weight:700}
.correction .why{display:block;color:var(--text-soft);margin-top:3px}
.typing{display:flex;gap:4px;padding:14px 16px}
.typing span{width:8px;height:8px;border-radius:50%;background:var(--text-soft);opacity:.5;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

/* ---------- Input ---------- */
.composer{padding:10px 14px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:var(--surface)}
.cbox{display:flex;align-items:flex-end;gap:8px;background:var(--surface-2);border-radius:22px;padding:6px 6px 6px 14px;border:1px solid var(--line)}
.cbox textarea{flex:1;border:none;background:transparent;resize:none;font-family:var(--font);font-size:15px;color:var(--text);max-height:120px;line-height:1.4;padding:7px 0;outline:none}
.send,.mic,.hint{border:none;cursor:pointer;border-radius:50%;width:40px;height:40px;font-size:17px;display:flex;align-items:center;justify-content:center;flex:none;transition:.15s}
.send{background:var(--accent);color:#fff}.send:disabled{opacity:.4;cursor:default}
.mic{background:transparent;color:var(--text-soft)}.mic.rec{background:#e0413f;color:#fff;animation:pulse 1s infinite}
.hint{background:transparent;color:var(--text-soft);font-size:15px}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* ---------- Panels / Modal ---------- */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);z-index:40;display:none;align-items:flex-end;justify-content:center}
.overlay.show{display:flex;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surface);width:100%;max-width:560px;border-radius:24px 24px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:88dvh;overflow-y:auto;animation:up .28s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet h2{font-size:18px;margin-bottom:4px}
.sheet .sub{color:var(--text-soft);font-size:13px;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
.field input,.field select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:var(--surface-2);color:var(--text);font-size:14px;font-family:var(--font)}
.field .help{font-size:12px;color:var(--text-soft);margin-top:5px;line-height:1.5}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.opt{padding:11px;border:1px solid var(--line);border-radius:12px;font-size:13px;cursor:pointer;background:var(--surface-2);text-align:center;transition:.15s}
.opt.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:700}
.btn{width:100%;padding:13px;border:none;border-radius:14px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.btn.ghost{background:var(--surface-2);color:var(--text)}
.vocab-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}
.vocab-item b{color:var(--accent)}
.vocab-item .zh{color:var(--text-soft);font-size:13px}
.empty{text-align:center;color:var(--text-soft);font-size:13px;padding:30px 0}
.popover{position:absolute;z-index:60;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:13px;max-width:260px;font-size:13px;line-height:1.5;display:none}
.popover.show{display:block;animation:fade .15s}
.popover b{color:var(--accent);font-size:15px}
.popover .pos{color:var(--text-soft);font-style:italic;margin-left:5px}
.popover .ex{display:block;margin-top:6px;color:var(--text-soft)}
.popover .add{margin-top:9px;width:100%;padding:8px;border:none;border-radius:9px;background:var(--accent-soft);color:var(--accent);font-weight:700;cursor:pointer;font-size:12px}
.banner{margin:10px 16px 0;padding:11px 13px;border-radius:13px;background:var(--accent-soft);color:var(--accent);font-size:13px;line-height:1.5;display:flex;gap:8px;align-items:flex-start}
.banner b{cursor:pointer;text-decoration:underline}
.stat{display:flex;gap:10px;margin:8px 0 16px}
.stat .c{flex:1;background:var(--surface-2);border-radius:14px;padding:12px;text-align:center}
.stat .c b{display:block;font-size:22px}.stat .c span{font-size:11px;color:var(--text-soft)}
#reBar:empty{display:none}
#reBar{display:flex;align-items:center;gap:10px;margin:8px 16px 0;padding:9px 13px;border-radius:13px;background:var(--accent-soft);color:var(--accent);font-size:13px;font-weight:700}
#reBar .grow{flex:1}
#reBar button{border:none;background:var(--accent);color:#fff;font-weight:700;font-size:13px;padding:8px 13px;border-radius:11px;cursor:pointer}
#reBar button:disabled{opacity:.4}
.recap-list{font-size:14px;line-height:1.7}
.recap-list li{margin-left:18px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand"><span class="dot"></span>Parla</div>
    <div class="h-spacer"></div>
    <div class="streak" id="streakBtn" title="连续学习天数">🔥 <span id="streakN">0</span></div>
    <div class="ring" id="ringBtn" title="CEFR 进度">
      <svg width="42" height="42"><circle cx="21" cy="21" r="17" stroke="var(--line)" stroke-width="4" fill="none"/>
      <circle id="ringFill" cx="21" cy="21" r="17" stroke="var(--accent)" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="107" stroke-dashoffset="60"/></svg>
      <div class="lvl" id="ringLvl">B1</div>
    </div>
    <button class="icon-btn" id="themeBtn" title="深浅色">🌙</button>
    <button class="icon-btn" id="setBtn" title="设置">⚙️</button>
  </header>

  <div class="modebar" id="modebar"></div>
  <div id="bannerWrap"></div>
  <div id="reBar"></div>
  <div class="chat" id="chat"></div>

  <div class="composer">
    <div class="cbox">
      <button class="hint" id="hintBtn" title="给我提示">💡</button>
      <textarea id="input" rows="1" placeholder="用意大利语写点什么… (Scrivi in italiano)"></textarea>
      <button class="mic" id="micBtn" title="语音输入">🎤</button>
      <button class="send" id="sendBtn" title="发送">➤</button>
    </div>
  </div>

  <div class="popover" id="pop"></div>
  <div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
</div>

<script>window.WRITTEN_BANK=[{"id":1155,"area":"civ","q":"Se il Sig.Onassio vende al Sig.Berlusca una villa, si trasferiscono a quest'ultimo anche il garage ed il giardino annessi?","opts":["Soltanto quando le parti lo abbiano espressamente stabilito nel contratto.","Si, purchè le parti non abbiano manifestato una diversa volontà nel contratto.","Sempre."]},{"id":1158,"area":"civ","q":"Qual è una delle differenze fra i diritti reali e i diritti di obbligazione?","opts":["I diritti reali sono diritti relativi, mentre i diritti di obbligazione sono diritti assoluti.","I diritti reali sono esperibili verso tutti, mentre i diritti di obbligazione sono esperibili verso determinate persone.","I diritti reali sono imprescrittibili, mentre i diritti di obbligazione si prescrivono in 15 anni."]},{"id":1160,"area":"civ","q":"Può il proprietario di un fondo opporsi alle attività di terzi che si svolgono nel sottosuolo o nello spazio sovrastante il suolo stesso?","opts":["Sì, sempre.","Sì, ma non a quelle che si svolgono ad una profondità o ad un'altezza tale che egli non abbia interesse ad escluderle.","Solo a quelle nel sottosuolo che siano dannose per il fondo o per le persone e mai a quelle nello spazio sovrastante."]},{"id":1161,"area":"civ","q":"Il Sig.Alfa decide di piantare un albero sul proprio fondo, ma al solo ed esclusivo scopo di impedire la vista del panorama al suo vicino. Un simile comportamento può qualificarsi come \"atto emulativo\"?","opts":["No, perché si configura come un legittimo atto di esercizio del diritto di proprietà.","Sì, ma occorre dimostrare che il pregiudizio arrecato al vicino dall'atto sia superiore all'utilità che ne trae il suo autore.","Sì, ma solo se si dimostra la mancanza di utilità dell'atto per il proprietario e l'intenzione di nuocere o arrecare molestia."]},{"id":1162,"area":"civ","q":"Il proprietario di un fondo può impedire le esalazioni provenienti da un'industria sita sul fondo attiguo?","opts":["Sempre, perché il codice civile pone un generale divieto d'immissioni.","Solo si si tratta di un'industria che esercita un'attività non autorizzata dalla Pubblica Amministrazione.","Solo quelle eccedenti la normale tollerabilità."]},{"id":1163,"area":"civ","q":"Quale fra i seguenti modi d'acquisto della proprietà non è a titolo originario?","opts":["L'usucapione","Il contratto","L'invenzione"]},{"id":1164,"area":"civ","q":"Nel nostro ordinamento giuridico, dov'è disciplinata l'espropriazione per pubblico interesse?","opts":["Nelle leggi speciali.","Nella Costituzione","Nella Costituzione, nel codice civile e nelle leggi speciali"]},{"id":1165,"area":"civ","q":"Che cos'è la specificazione?","opts":["La trasformazione della materia in una nuova cosa.","La precisa puntualizzazione dell'accordo da parte dei contraenti nelle trattative che precedono la conclusione del contratto.","Un modo di acquisto della proprietà a titolo derivativo."]},{"id":1168,"area":"civ","q":"Se il Sig.Fortunato trova delle cose mobili che non appartengono ad alcuno, egli le acquista a titolo originario:","opts":["Con l'occupazione.","Con l'accessione.","Con la commistione."]},{"id":1169,"area":"civ","q":"Se Fortunato ritrova per caso nel fondo di Gustavo una cosa mobile di pregio, sotterrata, di cui nessuno può provare d'essere proprietario:","opts":["Deve consegnarla prontamente al Sindaco del luogo e ne acquista la proprietà se, trascorso un anno dalla pubblicazione del ritrovamento nell'albo pretorio, il proprietario non si presenta.","La cosa spetta interamente a Gustavo","La cosa spetta per metà a Fortunato e per metà a Gustavo."]},{"id":1170,"area":"civ","q":"Quale delle seguenti azioni non è esperibile a difesa della proprietà?","opts":["L'azione negatoria.","L'azione confessoria.","L'azione per apposizione di termini."]},{"id":1171,"area":"civ","q":"La legittimazione ad agire nell'azione di rivendicazione spetta:","opts":["Al possessore.","Al possessore e al detentore.","A chi sostiene di essere proprietario e non sia in possesso della cosa rivendicata."]},{"id":1172,"area":"civ","q":"Maria Pia costruisce sul proprio fondo un muro ad una distanza di un metro dal fondo di Maria Stella. Potrà Maria Stella chiedere la comunione forzosa del muro?","opts":["No, perché la comunione può essere chiesta solo se il muro si trova sul confine.","Sì, ma soltanto allo scopo di fabbricare contro il muro stesso.","No, però Maria Stella potrà pretendere che Maria Pia estenda il muro fino al confine."]},{"id":1173,"area":"civ","q":"Se Ortensio pretende di avere un diritto di servitù sul fondo di Tiberio, quale azione può esercitare quest'ultimo per dichiarare l'inesistenza del diritto vantato da Ortensio?","opts":["L'azione negatoria.","L'azione di denuncia di danno temuto.","L'azione per apposizione di termini."]},{"id":1174,"area":"civ","q":"In materia di rivendica, quale di queste affermazioni è vera?","opts":["L'azione di rivendicazione è soggetta alla prescrizione ordinaria decennale.","L'azione di rivendicazione non si prescrive, salvi gli effetti dell'acquisto della proprietà da parte di altri per usucapione.","L'azione di rivendicazione è imprescrittibile solo se riguarda beni immobili."]},{"id":1175,"area":"civ","q":"Qual è la posizione del proprietario sul piano probatorio nell'azione negatoria?","opts":["Non deve provare nulla (può limitarsi ad affermare, come si suol dire, \"possideo quia possideo\").","Deve provare di essere proprietario nel modo particolare previsto dalla legge espressamente per tale ipotesi.","Basta che provi di possedere il bene in base ad un titolo valido."]},{"id":1176,"area":"civ","q":"Quale fra i diritti che seguono si deve considerare imprescrittibile?","opts":["Usufrutto","Superficie","Proprietà"]},{"id":1177,"area":"civ","q":"A quale figura dà luogo l'ipotesi in cui Max concede a Guglielmo il diritto di costruire e mantenere una cantina al disotto del proprio suolo?","opts":["Enfiteusi","Servitù","Superficie"]},{"id":1178,"area":"civ","q":"E' giuridicamente ammissibile una proprietà di una piantagione separata dalla proprietà del fondo?","opts":["In ogni caso","Solo se il valore della piantagione supera il valore del fondo","In nessun caso"]},{"id":1179,"area":"civ","q":"Quale di queste affermazioni è vera?","opts":["Il diritto di superficie è soggetto alla prescrizione ordinaria decennale","Il diritto di superficie perpetuo o con durata ultraventennale si estingue per prescrizione per effetto del non uso protratto per venti anni","Il diritto di superficie con durata infraventennale è soggetto a prescrizione decennale"]},{"id":1180,"area":"civ","q":"Quale di queste caratteristiche si riferisce al diritto reale di enfiteusi?","opts":["La durata necessariamente temporanea","La vicinanza dei fondi","L'obbligo di migliorare i fondi"]},{"id":1181,"area":"civ","q":"A quale diritto reale si riferiscono i diritti di affrancazione e devoluzione?","opts":["Diritto di proprietà","Superficie","Enfiteusi"]},{"id":1182,"area":"civ","q":"Che cosa s'intende per \"nuda proprietà\"?","opts":["Il potere che spetta al proprietario in caso di usufrutto","Il potere di godimento che spetta all'usufruttuario","Il potere di godimento che spetta all'enfiteuta"]},{"id":1183,"area":"civ","q":"Può l'usufrutto eccedere la vita dell'usufruttuario?","opts":["Solo se le parti lo hanno espressamente stabilito","Solo nei casi previsti tassativamente dalla legge","In nessun caso"]},{"id":1184,"area":"civ","q":"L'usufruttuario di un fondo che il proprietario ha destinato a giardino può trasformarlo impiantandovi un frutteto?","opts":["In nessun caso","Solo se la trasformazione risponde meglio ad esigenze di ordine economico e sociale","Si, ma deve corrispondere al proprietario l'equa indennità determinata dal giudice"]},{"id":1185,"area":"civ","q":"L'usufrutto avente ad oggetto un bene deteriorabile è:","opts":["Una fattispecie che rientra nel quadro dell'usufrutto","Una figura sui generis che prende il nome di \"quasi usufrutto \"","Una figura inammissibile, perché l'usufrutto può avere ad oggetto eventualmente beni consumabili, ma non beni deteriorabili"]},{"id":1186,"area":"civ","q":"E' ammissibile una servitù tra due fondi appartenenti allo stesso proprietario?","opts":["Si","No","Soltanto se i due fondi sono vicini"]},{"id":1187,"area":"civ","q":"Le servitù coattive (o legali) in che modo si costituiscono?","opts":["Con un contratto o con una sentenza costitutiva","\"Ipso iure\", cioè automaticamente per legge","Con decreto ministeriale"]},{"id":1188,"area":"civ","q":"Umberto, proprietario del fondo \"Tuscolano\", beneficia di una servitù di passaggio sul fondo confinante, di proprietà di Carlo. A seguito di una frana, la strada, utilizzata quotidianamente da Umberto per l'esercizio del suo diritto di servitù, viene completamente bloccata. A questo punto sorge una controversia, in quanto né Umberto, né Carlo intendono fare alcunchè per riparare all'accaduto. Il giudice, adito sul fatto, che cosa deciderà?","opts":["Che Carlo (proprietario del fondo servente) deve riparare la strada a sue spese","Che Umberto (titolare del fondo dominante) può procedere alla riparazione, ma accollandosene l'intero costo","Che Umberto può effettuare le riparazioni, rivalendosi su Carlo per la metà delle spese"]},{"id":1189,"area":"civ","q":"Le servitù si possono costituire per uscapione?","opts":["Si.","Soltanto le servitù apparenti.","Soltanto le servitù non apparenti."]},{"id":1190,"area":"civ","q":"Cos'è la destinazione del padre di famiglia?","opts":["Un modo di costituzione delle servitù coattive","Un modo di costituzione delle servitù apparenti","Un modo di costituzione delle servitù affermative"]},{"id":1191,"area":"civ","q":"Che cos'è il condominio negli edifici?","opts":["Un diritto reale su cosa altrui","Un diritto reale limitato avente ad oggetto edifici","Una figura particolare di comunione"]},{"id":1192,"area":"civ","q":"Che cos'è il possesso?","opts":["Un potere su una cosa che si manifesta in un'attività corrispondente all'esercizio della proprietà o di altro diritto reale","Un diritto reale di godimento","Un diritto reale parziario"]},{"id":1193,"area":"civ","q":"Quale fra i seguenti è un elemento del possesso?","opts":["La continuità","La volontà del soggetto di esercitare sul bene i poteri del proprietario o del titolare di un altro diritto reale","La laudatio possessoris"]},{"id":1194,"area":"civ","q":"Luca spossessa lo zio di una collana di libri, e subito depo la regala all'amico Friz, il quale riceve il dono ignorando l'avvenuto spossessamento. Non apprezzando particolarmente il regalo ricevuto, Friz si decide ad alienare l'intera collana di libri a Martina. Potrà, quest'ultima, diventare proprietaria dei libri, ove sia a conoscenza dello spossessamento iniziale?","opts":["No, mai","Sì, ma solo se sussistono a favore di Martina tutti gli elementi previsti dall'art.1153 c.c. (buona fede, al momento della consegna, e titolo idoneo al trasferimento della proprietà)","Sì, ed anche a prescindere dalla consegna effettiva dei libri"]},{"id":1195,"area":"civ","q":"Qual è l'elemento che differenzia detenzione e possesso?","opts":["Nel possesso, a differenza che nella detenzione, non v'è relazione col bene","Nel possesso, a differenza che nella detenzione, v'è l'intenzione di tenere la cosa come proprietario o come titolare di altro diritto reale","Il possesso si esercita su beni immobili, mentre la detenzione si esercita su beni mobili"]},{"id":1196,"area":"civ","q":"Quale di questi vantaggi è attribuito al possessore per il semplice fatto di possedere la cosa?","opts":["La posizione di attore nell'azione di rivendica","La tutela petitoria","La possibilità di acquistare il bene per usucapione"]},{"id":1197,"area":"civ","q":"Con quale di queste azioni si difende il possesso?","opts":["Azione di rivendica","Azione di reintegrazione o spoglio","Azione negatoria"]},{"id":1198,"area":"civ","q":"Può esercitarsi l'azione di manutenzione a tutela del possesso di un bene mobile?","opts":["Sì, ma solo se il possesso dura da oltre un anno senza interruzione","Sì, sempre che l'azione sia esercitata entro un anno dalla molestia o dallo spoglio","No, l'azione di manutenzione è ammessa solo a tutela del possesso di beni immobili o universalità di mobili"]},{"id":1199,"area":"civ","q":"Che cos'è la denunzia di nuova opera?","opts":["La richiesta di brevetto per una nuova opera di ingegno","La denunzia alla Autorità Giudiziaria di una nuova opera intrapresa da altri che il denunziante teme possa cagionare danni alla propria cosa","L'azione diretta ad ottenere il rispetto delle distanze tra edifici"]},{"id":1200,"area":"civ","q":"Che cos'è l'usucapione?","opts":["Un modo di acquisto della proprietà (e dei diritti reali di godimento) a titolo derivativo","Un effetto del possesso","Una qualificazione del possesso"]},{"id":1203,"area":"civ","q":"Secondo il codice civile e fatte salve le disposizioni dei regolamenti locali, le costruzioni su fondi finitimi, se non unite o aderenti, devono essere tenute ad una distanza non minore:","opts":["Di tre metri","Di un metro e mezzo","Dell'altezza della costruzione da eseguire"]},{"id":1204,"area":"civ","q":"A norma del codice civile tra i modi di acquisto della proprietà vi è:","opts":["L'enfiteusi ultraventennale","L'invenzione","L'immissione"]},{"id":1205,"area":"civ","q":"Quali mezzi di prova sono ammessi nell'azione di regolamento di confini?","opts":["Sono ammesse solo le risultanze delle mappe catastali","Sono ammesse solo la confessione e il giuramento decisorio","Ogni mezzo di prova è ammesso"]},{"id":1206,"area":"civ","q":"Secondo il codice civile può il proprietario di un fondo agricolo costituire su di esso un diritto di superficie a tempo indeterminato?","opts":["No","Sì, ma a condizione che sia stata già rilasciata la concessione edilizia","Sì"]},{"id":1207,"area":"civ","q":"Tizio ha concesso in enfiteusi il fondo Tuscolano a Caio senza nulla pattuire in ordine alla facoltà di disposizione del diritto dell'enfiteuta. In questo caso, l'enfiteuta può disporre del proprio diritto per atto tra i vivi?","opts":["No","Sì","No, salvo che si tratti di enfiteusi perpetua"]},{"id":1208,"area":"civ","q":"Vi è un limite per la durata dell'usufrutto costituito dal proprietario in favore di una società per azioni?","opts":["Sì, trenta anni","No, non vi è alcun limite","Sì, la vita del nudo proprietario"]},{"id":1209,"area":"civ","q":"Tizio, titolare del diritto reale di uso su una cosa fruttifera, può raccogliere i frutti della stessa?","opts":["Sì, ma solo per quanto occorre ai bisogni suoi e della sua famiglia","No","No, salvo che sia stato espressamente autorizzato dal proprietario della cosa"]},{"id":1210,"area":"civ","q":"E' ammessa l'immediata costituzione a titolo oneroso di servitù degli avanzi d'acqua fra due fondi appartenenti in proprietà esclusiva allo stesso proprietario?","opts":["No","Sì","Sì, solo se i fondi non confinano tra loro"]},{"id":1211,"area":"civ","q":"Sono oggetto di proprietà comune dei proprietari dei diversi piani o porzioni di piani di un edificio, se il contrario non risulta dal titolo:","opts":["Gli acquedotti che servono all'uso e al godimento comune","Gli sporti pertinenziali alle proprietà esclusive ma che permettono di guardare solo lateralmente","Tutti i locali del piano cantinato esclusi i locali per la lavanderia"]},{"id":1212,"area":"civ","q":"Tizio, conduttore di un immobile concessogli in locazione dal proprietario Caio, vi ha effettuato, senza il consenso di quest'ultimo, lavori di trasformazione riservati dal contratto di locazione al proprietario, ma senza volere disconoscere il possesso di Caio. In tal modo, Tizio ha mutato la sua detenzione in possesso?","opts":["Sì","No","No, salvo che la locazione abbia per oggetto un immobile destinato ad uso abitativo"]},{"id":1213,"area":"civ","q":"E' possessore di buona fede:","opts":["Solo chi possiede in base ad un titolo valido ed idoneo a trasferire il diritto di proprietà","Chi possiede ignorando di ledere l'altrui diritto","Solo chi è stato immesso nel possesso del bene volontariamente dal proprietario"]},{"id":1214,"area":"civ","q":"Il possessore tenuto alla restituzione della cosa ha diritto a indennità per i miglioramenti recati alla stessa?","opts":["Sì, in ogni caso","No, mai","sì, purchè i miglioramenti sussistano al tempo della restituzione"]},{"id":1215,"area":"civ","q":"In mancanza di titolo idoneo, con il decorso di quanti anni si compie l'usucapione dei beni mobili qualora il possesso sia stato acquistato in buona fede?","opts":["Di venti anni","Di dieci anni","Di cinque anni"]},{"id":1216,"area":"civ","q":"A quali tra questi soggetti non spetta l'azione di denunzia di danno temuto?","opts":["Al titolare di un diritto di superficie","Al creditore ipotecario","Al possessore"]},{"id":1217,"area":"civ","q":"Qual è il contenuto dell'obbligazione?","opts":["Una sanzione","Una prestazione","La soddisfazione di un interesse necessariamente patrimoniale del creditore"]},{"id":1218,"area":"civ","q":"Quale, tra le seguenti ipotesi, non può mai costituire \"fonte\" di un'obbligazione?","opts":["Un fatto illecito","Il possesso o la \"detenzione qualificata\"","Un contratto"]},{"id":1219,"area":"civ","q":"Come si distingue l'obbligazione civile dall'obbligazione naturale?","opts":["Soltanto l'obbligazione civile è coercibile","L'obbligazione civile è imprescrittibile, l'obbligazione naturale si prescrive in cinque anni","Soltanto l'obbligazione civile ha un contenuto patrimoniale"]},{"id":1220,"area":"civ","q":"Felice Canoro, suonatore alle prime armi di trombone, si impegna dietro corrispettivo con il suo vicino a non esercitarsi con il suo terribile strumento in alcune ore del giorno. E' ammissibile tale obbligazione?","opts":["No, perché la prestazione non ha contenuto economico","Sì, in quanto la prestazione è suscettibile di valutazione economica, essendo pattuita una controprestazione","No, trattandosi di prestazione illecita"]},{"id":1221,"area":"civ","q":"Può essere fonte di obbligazione un atto unilaterale di volontà?","opts":["No, fonte dell'obbligazione è solo il contratto","Sì, ma solo nei casi previsti dalla legge","Sì, anche se si tratta di atti negoziali atipici"]},{"id":1222,"area":"civ","q":"Quale, tra le seguenti obbligazioni, si classifica come \"obbligazione di mezzi?\"","opts":["La prestazione del locatore","La prestazione del depositario","La prestazione dell'avvocato"]},{"id":1223,"area":"civ","q":"Qual è l'obbligazione alternativa, tra le seguenti?","opts":["Quella che ha un contenuto \"multiplo\" in quanto il debitore è tenuto ad eseguire due o più prestazioni ed è liberato solo quando tutte sono eseguite","Quella in cui sono previste, pur restando unico il rapporto obbligatorio, due o più prestazioni, ma il debitore si libera eseguendone una soltanto","Quella in cui vi sono più debitori ed il creditore può rivolgersi indifferentemente a ciascuno di essi per ottenere l'adempimento dell'intera prestazione"]},{"id":1224,"area":"civ","q":"Camillo, debitore di Furio, paga anticipatamente estinguendo l'obbligazione a cui è tenuto, prima della scadenza del termine fissato dalle parti. Avendo urgente bisogno di denaro, Camillo vuole, però, indietro la somma anticipatamente versata. Potrà chiederne la ripetizione?","opts":["Camillo può ripetere la somma versata solo se prova di aver ignorato l'esistenza del termine","Può ripetere la somma versata solo ove si tratti di una prestazione di carattere personalissimo","No, egli può solo ripetere, nei limiti della perdita subita, ciò di cui il creditore si è arricchito per effetto del pagamento anticipato"]},{"id":1225,"area":"civ","q":"Dario, imprenditore edile, acquista da Tiberio una partita di mattoni. Il pagamento, quale corrispettivo della vendita, è versato immediatamente, mentre la consegna della merce viene differita di una settimana, affinchè Dario possa più agevolmente impiegarla nell'azienda. Dopo soli due giorni Dario ci ripensa e chiede la merce a Tiberio. Lo potrà fare?","opts":["Sì, senza preclusioni di sorta","No, perché il termine è sempre stabilito a favore del debitore","Sì, ma solo nel caso in cui il termine sia convenzionalmente stabilito a favore esclusivo dell'acquirente"]},{"id":1226,"area":"civ","q":"Quando l'indivisilibità dell'obbligazione è assoluta?","opts":["Quando la prestazione ha per oggetto una cosa indivisibile per natura oppure un fatto che non ammette esecuzione parziale","Quando oggetto dell'obbligazione è una \"universitas facti\"","Quando oggetto dell'obbligazione è un'azienda"]},{"id":1227,"area":"civ","q":"L'indivisibilità persiste anche nei confronti degli eredi?","opts":["No, perché cessa con la morte del debitore o del creditore","Sì, opera anche nei confronti degli eredi del debitore o di quelli del creditore","Solo quando la prestazione ha per oggetto una cosa indivisibile per natura"]},{"id":1228,"area":"civ","q":"Quando si ha l'obbligazione solidale?","opts":["Quando l'obbligazione ha per contenuto un unico rapporto con due o più oggetti, ma il debitore si libera con la prestazione di uno solo","Quando l'obbligo o il diritto (di ciascun debitore o di ciascun creditore) è proporzionale alla sua partecipazione al vincolo obbligatorio","Quando ci sono più creditori e ciascuno ha il diritto di pretendere la prestazione per l'intero, o quando ci sono più debitori e ciascuno ha l'obbligo di eseguire la prestazione \"pro toto\""]},{"id":1229,"area":"civ","q":"Primo, Secondo e Terzo sono creditori in solido di Mevio. Scaduto il debito, quale dovrà essere il destinatario del pagamento?","opts":["Destinatario del pagamento sarà quello indicato come tale dall'accordo concluso tra i concreditori","Destinatario del pagamento sarà uno qualsiasi dei concreditori fino a quando uno di essi non prevenga gli altri con una domanda giudiziale","Primo, Secondo e Terzo dovranno ricevere ciascuno la propria quota di credito"]},{"id":1230,"area":"civ","q":"Quando sussiste la solidarietà passiva?","opts":["Quando è espressamente stabilita dalla legge","Quando è stabilita dalle parti","Ogni qualvolta in un medesimo rapporto ci sono più debitori e dalla legge o dal titolo non risulta diversamente"]},{"id":1231,"area":"civ","q":"Qual è la conseguenza dell'adempimento di un'obbligazione naturale?","opts":["La restituzione di ciò che è stato pagato, su richiesta di chi ha adempiuto","La irripetibilità di ciò che è stato pagato, purchè l'adempimento sia avvenuto a seguito di domanda giudiziale del creditore","La irripetibilità di ciò che è stato dato a titolo di pagamento, purchè esso sia stato eseguito spontaneamente"]},{"id":1232,"area":"civ","q":"Aldo riceve da Carlo il pagamento, per un credito che ha nei confronti di Luca. E' valido tale atto, considerando che Luca si è opposto al pagamento di Carlo?","opts":["Il pagamento del terzo non ha valore, perché il debitore s'è opposto.","Il pagamento del terzo è valido solo se è stato autorizzato all'Autorità Giudiziaria.","Tale atto è pienamente valido in quanto l'opposizione del debitore al pagamento del terzo dà una mera facoltà al creditore ma non lo obbliga a rifiutare l'adempimento."]},{"id":1233,"area":"civ","q":"Stefano deve compiere una certa prestazione nei confronti di Mauro, ma conviene che quest'ultimo si impegni, da parte sua, a sostenere tutte le spese che si rendano necessarie per l'esecuzione della prestazione stessa. Se Mauro risulta inadempiente ad un tale obbligo, chi risponderà, verso i terzi, del mancato pagamento?","opts":["Stefano, perché le spese dell'adempimento sono sempre a carico del debitore","Mauro, per effetto della stipulazione che lo obbliga alle spese","Stefano, salvo però il diritto, da parte sua, di rivalersi su Mauro"]},{"id":1235,"area":"civ","q":"Paolo chiede a Romolo un prestito, impegnandosi a saldarlo il giorno successivo. L'indomani Paolo incontra per caso Remo, fratello convivente di Romolo e, profittando dell'occasione dà a Remo la somma oggetto del prestito. Se Remo non la restituisce al fratello (creditore effettivo), può Paolo ritenersi libero da ogni obbligo?","opts":["Sì, ma solo se provi la propria buona fede","Sì, ma solo se provi la mala fede di Remo","Sì, a meno che Romolo (creditore effettivo) non provi la mala fede del debitore"]},{"id":1236,"area":"civ","q":"Il creditore può legittimamente rifiutare un adempimento parziale dell'obbligazione?","opts":["No, a meno che la prestazione sia indivisibile","Sì, anche se la prestazione è divisibile, a meno che la legge o gli usi dispongano diversamente","Sì, ma solo se vi è un accordo tra creditore e debitore in tal senso"]},{"id":1237,"area":"civ","q":"Il Sig.Neretti è debitore di mille euro nei confronti del Sig.Bianchini, che deve con tale somma comprare una lampada abbronzante. Successivamente i due convengono che il debitore verrà liberato acquistando la lampada al Sig.Bianchini. In quale momento l'obbligazione del Sig.Neretti si estingue?","opts":["Non appena viene raggiunto l'accordo sulla diversa prestazione","Con la consegna della lampada al Sig.Bianchini (creditore)","Non appena il debitore conclude il contratto di compravendita avente ad oggetto la lampada"]},{"id":1238,"area":"civ","q":"Con quale moneta si estinguono le obbligazioni pecuniarie?","opts":["Solo con la moneta che all'epoca dell'assunzione del debito pecuniario aveva corso legale nello Stato","Con moneta avente corso legale nello Stato al tempo del pagamento e per il suo valore reale","Con moneta avente corso legale nello Stato al tempo del pagamento e per il suo valore nominale"]},{"id":1239,"area":"civ","q":"Quando l'impossibilità di adempiere l'obbligazione libera il debitore?","opts":["Quando è oggettiva, sopravvenuta ed inevitabile","Quando è soggettiva ed imprevedibile","Quando è oggettiva ed imprevedibile"]},{"id":1240,"area":"civ","q":"Il creditore rifiuta, senza legittimo motivo, di ricevere il pagamento offertogli o di compiere quanto è necessario affinchè il debitore possa adempiere l'obbligazione. Quale atto deve compiere il debitore per costituire il creditore in mora?","opts":["L'offerta solenne della cosa dovuta","Un'offerta anche informale della cosa dovuta","La citazione in giudizio del creditore"]},{"id":1241,"area":"civ","q":"Teresa deve a Marzia una somma di denaro da pagare entro la fine del mese al domicilio del creditore. Alla scadenza, Teresa è inadempiente. Quale atto deve compiere il creditore Marzia per costituire Teresa in mora?","opts":["Un' intimazione a pagare fatta per iscritto","Nessuno, perché la debitrice Marzia è già in mora per il solo fatto del ritardo","Un'intimazione a pagare, fatta per iscritto o oralmente"]},{"id":1242,"area":"civ","q":"Franco, debitore verso Fulvio di un quadro d'autore, non adempie la sua prestazione nel termine prefissato ed è perciò costituito in mora. Successivamente un incendio fortuito distrugge il quadro. Quale conseguenza giuridica produce tale avvenimento?","opts":["Franco deve in ogni caso risarcire i danni al creditore Fulvio","Franco deve risarcire il danno ma può liberarsi dimostrando che il quadro sarebbe ugualmente perito presso il creditore","Franco deve corrispondere a Fulvio una somma pari la valore del quadro al momento della sua distruzione maggiorata del 15%"]},{"id":1243,"area":"civ","q":"Lorenzo deve a Giacomo 150 euro a titolo di risarcimento del danno e, poiché ha bisogno di danaro, conviene con il creditore che tratterrà tale somma, a titolo di mutuo, e la restituirà nel termine di un anno. Come si definisce l'accordo col quale i due soggetti stabiliscono il mutamento del titolo dell'obbligazione?","opts":["Prestazione in luogo dell'adempimento","Novazione","Compensazione"]},{"id":1244,"area":"civ","q":"Il sig.Alfa deve al sig.Beta una somma di denaro in base ad un contratto annullabile perché viziato da dolo. Successivamente, benchè resosi conto del vizio del contratto, il sig.Alfa stipula con il sig.Beta una novazione con la quale, estinguendo l'obbligazione originaria, si obbliga a consegnare un cavallo da corsa. E' valida tale novazione?","opts":["No, è annullabile, perché l'obbligazione originaria deriva da titolo annullabile","Sì, perché il debitore ha assunto validamente il nuovo debito conoscendo il vizio del titolo originario","Sì, e lo sarebbe stata anche se il debitore non fosse stato a conoscenza del vizio del titolo originale"]},{"id":1245,"area":"civ","q":"Il Sig. Untuosi è creditore verso il Sig. Olivella di una partita di olive. Successivamente, poiché non è più interessato al prodotto dovutogli, dichiara al sig. Olivella, suo debitore, di rimettergli il debito. Può il Sig. Olivella opporsi a tale remissione?","opts":["Sì, il debitore può dichiarare in un congruo termine di non voler profittare della remissione","Sì, ma il debitore può opporsi solo adducendo giustificati motivi","Sì, ma solo se tale possibilità era prevista dal titolo"]},{"id":1246,"area":"civ","q":"La compensazione legale si ha quando:","opts":["V'è coesistenza di debiti omogenei, liquidi ed esigibili","Uno dei debiti reciproci non è liquido ma è di facile e pronta liquidazione","V'è coesistenza di debiti liquidi ed esigibili, anche se non omogenei"]},{"id":1247,"area":"civ","q":"Mucio e Scevola sono obbligati, l'uno verso l'altro, per una somma di 25 euro. Entrambi i crediti sono esigibili il 1° aprile, ma il credito di Mucio cade in prescrizione il 10 aprile. Il 15 aprile, Scevola cita Mucio in giudizio chiedendo che sia condannato al pagamento di quanto dovutogli e, poiché Mucio dichiara di avvalersi della compensazione, eccepisce la prescrizione del diritto di quest'ultimo. Può aversi l'estinzione dei due debiti per compensazione?","opts":["No, perché nel momento in cui Mucio eccepisce la compensazione il suo credito è già caduto in prescrizione","Sì, perché la prescrizione è successiva alla coesistenza dei crediti","Sì, ma è rimessa alla valutazione discrezionale del giudice"]},{"id":1248,"area":"civ","q":"Quale dei seguenti non è un modo di estinzione delle obbligazioni?","opts":["Novazione","Remissione","Espromissione"]},{"id":1249,"area":"civ","q":"Federico de Notaiis è creditore verso il sig. Precarietti di una partita di gomma arabica. Poiché quest'ultimo muore lasciando il sig. De Notaiis come unico erede, questi subentrando nel patrimonio del de cuius, si ritrova contemporaneamente creditore e debitore di uno stesso rapporto obbligatorio. Qual è la causa di estinzione di tale obbligazione?","opts":["La compensazione","La confusione","La remissione"]},{"id":1250,"area":"civ","q":"Il 14 giugno il sig. Strozzinetti cede al dott. Buzzoni un credito che egli vanta nei confronti di Luigi Morosito. Il dott. Buzzoni provvede a notificare la cessione al debitore solo il 22 giugno. Il 16 giugno, però, lo Strozzinetti cede lo stesso credito al prof. Frescone, il quale si affretta a notificare la cessione al debitore il giorno seguente. A chi il debitore dovrà pagare?","opts":["Al prof. Frescone, che per primo ha provveduto alla notificazione","A colui che per primo gli chiede di adempiere","Al sig. Strozzinetti, finchè non accetta una delle due cessioni"]},{"id":1251,"area":"civ","q":"Quando è efficace la cessione del credito nei riguardi del debitore ceduto?","opts":["Quando l'ha accettata o gli è stata notificata","Solo se e quando egli partecipa alla stipulazione del negozio di cessione","Quando il cedente consegna al cessionario i documenti probatori del credito"]},{"id":1252,"area":"civ","q":"Chi cede un credito risponde verso il cessionario della solvenza del debitore ceduto?","opts":["No, salvo che tale garanzia sia espressamente pattuita","Sì, salvo che tale garanzia sia esclusa","No, mai"]},{"id":1253,"area":"civ","q":"Affinchè si verifichi una successione nel debito \"inter vivos\" è indispensabile che:","opts":["Si tratti di un debito pecuniario","Il creditore consenta alla liberazione del debitore originario","Il nuovo debitore non sia insolvente"]},{"id":1254,"area":"civ","q":"Il sig. Alfa è debitore del sig. Beta e creditore del sig. Omega. Si rivolge al sig. Omega (suo debitore) e gli ordina di assumersi il debito che egli ha verso il sig. Beta. Quale figura giuridica ricorre?","opts":["Delegazione","Espromissione","Accollo"]},{"id":1255,"area":"civ","q":"Parti del contratto di accollo sono:","opts":["Il creditore e il terzo","Il debitore e il terzo","Il creditore, il debitore e il terzo"]},{"id":1257,"area":"civ","q":"Il sig. Cedente, al fine di liberarsi da tutti i suoi debiti, stipula con i propri creditori un contratto col quale cede loro alcuni beni, ritenendo che questi possono essere sufficienti a soddisfarli. Possono i creditori del sig. Cedente agire anche sui beni non compresi nella cessione?","opts":["No, perché la cessione dei beni ai creditori produce l'effetto di circoscrivere i beni sui quali i creditori possono agire","Sì, perché i creditori non perdono, per effetto della cessione, il diritto ad essere integralmente soddisfatti e, quindi, se non ritengono sufficienti a tal fine i beni ceduti, possono agire subito anche sui beni non ceduti","Sì, ma solo dopo aver liquidato le attività che sono state loro cedute"]},{"id":1258,"area":"civ","q":"La surrogazione nei diritti del creditore, nelle sue varie forme, presuppone comunque:","opts":["Che fra creditore e terzo sia intervenuta una cessione del credito","Che un terzo abbia adempiuto il debito altrui","Che la prestazinoe dovuta, avente ad oggetto una cosa determinata, sia diventata impossibile"]},{"id":1260,"area":"civ","q":"Una differenza importante tra clausola penale e caparra confirmatoria sta nel fatto che:","opts":["La prima è una pattuizione accessoria, mentre la seconda si identifica con l'adempimento","La sola clausola penale ha efficacia vincolante","La sola clausola penale ha una funzione di liquidazione preventiva del danno"]},{"id":1261,"area":"civ","q":"Un condominio ha commissionato alla ditta \"Buonarroti\" il rifacimento della facciata dell'edificio, stipulando una penale di 250 euro per l'ipotesi che i lavori non vengano ultimati entro sei mesi. Verificatosi il ritardo, la parte committente:","opts":["Può scegliere tra la prestazione dedotta nella penale e la prestazione principale","Ha senz'altro diritto alla somma di 250 euro, conservando inoltre il diritto alla prestazione principale","Ha diritto alla somma di 250 euro solo se prova di aver subito in danno dal ritardo"]},{"id":1262,"area":"civ","q":"Il privilegio è accordato dalla legge in considerazione:","opts":["Della causa del credito","Del tempo in cui il credito è sorto","Della data di scadenza"]},{"id":1263,"area":"civ","q":"Il privilegio generale può riguardare:","opts":["Solo i beni immobili","Solo i beni mobili","Sia i beni mobili che i beni immobili"]},{"id":1264,"area":"civ","q":"Cos'è il pegno?","opts":["Una garanzia personale","Un diritto reale di godimento","Un diritto reale di garanzia"]},{"id":1265,"area":"civ","q":"Quali fra questi beni non possono costituire oggetto di pegno?","opts":["I beni mobili","I beni immobili","I crediti"]},{"id":1266,"area":"civ","q":"Quali fra questi beni non possono costituire oggetto di ipoteca?","opts":["I beni mobili registrati","Le universalità di mobili","Le rendite dello Stato"]},{"id":1267,"area":"civ","q":"Quale tra le seguenti è una \"garanzia personale\"?","opts":["Il pegno","L'ipoteca","L'avallo"]},{"id":1268,"area":"civ","q":"Gaio, Felice e Fortunato, debitori in solido di un'ingente somma di denaro nei confronti di Filano, perdono, a seguito di un terremoto, tutti i loro beni. Il giovane Filano, d'animo generoso, si reca da Felice e, dichiaratosi addolorato per l'accaduto, gli restituisce il titolo del credito. Gaio e Fortunato, venuti a conoscenza del comportamento di Filano, si rivolgono ad un avvocato per sapere se possono considerarsi liberati dal debito. Che cosa risponderà l'avvocato?","opts":["Che essi sono liberati dal debito perché la restituzione del documento originale del credito libera tutti i debitori in solido.","Che essi sono liberati nei confronti di Filano, ma tenuti a pagare a Felice ciò che era dovuto a Filano","Che essi sono liberati nei confronti di Filano solo per la quota di debito gravante su Felice."]},{"id":1269,"area":"civ","q":"Il dott. Bisogno de Pecunia, in disperata situazione economica, necessita di 50 mila euro. Il suo amico Fiducietti, non avendo attualmente danaro liquido, manifesta la sua disponibilità a fare da fideiussore perché egli possa ottenere credito dal sig. De Mutuis. Quest'ultimo, volendo trarre il massimo vantaggio possibile dalla concessione in prestito del suo capitale, potrebbe:","opts":["Convenire con il mutuatario un tasso di interesse altissimo","Imporre all'amico Fiducietti, che si accinge a prestar garanzia, che la fideiussione sia prestata per una cifra superiore all'importo del debito","Convenire con il dott. De Pecunia, mutuatario, un tasso di interesse non esorbitante, ma più remunerativo di quello ottenibile da una Banca"]},{"id":1270,"area":"civ","q":"Il fideiussore, pagando al creditore, realizza:","opts":["Un atto di liberalità","La liberazione sua e del debitore principale nei confronti del creditore","Un adempimento da parte di terzo"]},{"id":1272,"area":"civ","q":"L'azione con la quale il creditore domanda che siano dichiarati inefficaci, nei suoi confronti, gli atti di disposizione del patrimonio con i quali il debitore rechi pregiudizio alle sue ragioni si chiama:","opts":["Azione surrogatoria","Azione revocatoria","Sequestro conservativo"]},{"id":1273,"area":"civ","q":"Quale fra questi non è un presupposto dell'azione revocatoria?","opts":["Un atto di disposizione che incide sul patrimonio del debitore.","L'inerzia del debitore nell'esercitare i propri diritti, tale da arrecare pregiudizio al proprio patrimonio e, conseguentemente, ledere le legittime aspettative del creditore","La diminuzione del patrimonio del debitore che si risolve in una sottrazione (dannosa) di taluni beni all'espropriazione del creditore"]},{"id":1274,"area":"civ","q":"Quali sono le conseguenze dell'azione revocatoria?","opts":["L'inefficacia delle alienazioni effettuate dal debitore nei confronti di tutti i creditori che possono subirne un pregiudizio","L'inefficacia degli atti dispositivi compiuti dal debitore nei confronti dei soli creditori che hanno esercitato l'azione.","L'inefficacia degli atti pregiudizievoli compiuti dal debitore nei confronti dei creditori che hanno esercitato l'azione e di tutti i creditori privilegiati."]},{"id":1275,"area":"civ","q":"La pescheria del Sarago resta senza ghiaccio per la mancata erogazione di energia elettrica ed è perciò costretta a distruggere una notevole quantità di pesce andato a male. Può la pescheria chiedere un risarcimento all'azienda erogatrice dell'energia elettrica?","opts":["Sì, secondo il principio della responsabilità per i danni indiretti.","Sì, per il principio della regolarità causale.","No, salvo che la mancanza di erogazione di energia elettrica sia conseguenza di una condotta dolosa."]},{"id":1276,"area":"civ","q":"Il sig. Accorto riconosce, con scrittura privata, di essere debitore del sig. Volpe della somma di 500 euro. Successivamente si rende conto che, poiché il contratto da cui tale debito deriva è nullo, egli in realtà nulla deve. Può ancora rifiutarsi di pagare?","opts":["Sì, ma ha l'onere di provare che il debito non esiste.","Sì, perché l'onere di provare l'esistenza del debito incombe sul creditore sig. Volpe","No, non potendo solo esperire, successivamente all'adempimento, un'azione di ingiustificato arricchimento"]},{"id":1277,"area":"civ","q":"Mentre il dott. De Pretore è in vacanza alle Maldive, una tubatura della sua abitazione si rompe, rischiando di allagare l'immobile. Un vicino di casa, il Sig.Delfinetti, provvede a chiamare l'idraulico, il quale esegue prontamente la riparazione. Sfortunatamente, dopo alcuni giorni, un incendio fortuito distrugge l'immobile. Il Sig. Delfinetti, successivamente, chiede al dott.De pretore di rimborsargli la somma da lui pagata all'idraulico come corrispettivo. Il dott.De Pretore, però, nega di dovere alcunchè, dal momento che la riparazione eseguita non gli è stata di alcuna utilità. E' fondata la pretesa del Sig. Delfinetti?","opts":["Sì, avendo egli utilmente iniziato la gestione.","No, l'obiezione del dott. De Pretore è esatta.","No, perché l'obbligazione s'è estinta per impossibilità sopravvenuta."]},{"id":1278,"area":"civ","q":"Il taxi del Sig. Fortunato Sventurini viene gravemente danneggiato in un incidente causato da Guido di Corsa, autista spericolato ed imprudente. Poiché il taxi resta quindici giorni fermo in officina per le necessarie riparazioni, Sventurini pretende che gli sia risarcito anche il mancato guadagno che avrebbe conseguito se avesse utilizzato la propria auto pubblica in tale periodo di tempo. E' ammissibile tale pretesa?","opts":["No, il risarcimento comprende soltanto le spese necessarie per la riparazione.","Sì, il danno risarcibile comprende anche tale mancato guadagno.","Sì, ma solo se il fatto costituisce un illecito penalmente rilevante."]},{"id":1280,"area":"civ","q":"Tizio, alla guida di un'autovettura prestatagli dal proprietario Caio, provoca un incidente a causa della sua imprudenza. Chi è responsabile per i danni da Tizio cagionati?","opts":["Esclusivamente il conducente Tizio.","Esclusivamente il proprietario Caio.","Sia il conducente che il proprietario solidalmente"]},{"id":1281,"area":"civ","q":"Karina Schoen, giovane autostoppista in vacanza in Italia, ottiene un passaggio da Terracina a Formia a bordo di un autocarro. L'autista distratto dall'avvenenza della ragazza, perde il controllo dell'automezzo finendo fuori strada. A che titolo Karina chiederà il risarcimento per le ferite riportate nell'incidente?","opts":["A nessun titolo, trattandosi di trasporto di cortesia.","Solo a titolo di responsabilità extra-contruattuale.","Solo a titolo di responsabilità contrattuale."]},{"id":1284,"area":"civ","q":"Il Sig. Vetusti acquista un vecchio e fatiscente edificio attualmente locato al Sig. Condotti, allo scopo di ristrutturarlo ed adibirlo a propria abitazione. Due giorni dopo la vendita, a causa del cattivo stato di manutenzione, un cornicione dell'edificio si stacca e ferisce un passante. Può il passante pretendere dal Sig. Vetusti il risarcimento del danno?","opts":["Sì, perché la rovina è dovuta ad un difetto di manutenzione.","No, responsabile è unicamente l'inquilino Sig. Condotti.","Sì, ma solo dopo aver agito inutilmente nei confronti dell'inquilino Sig. Condotti"]},{"id":1285,"area":"civ","q":"Il Sig. Salomon deve ad un negoziante 2.000 euro per la vendita di una partita di provolone piccante e 2.000 euro per la vendita di una partita di prosciutto di Parma. Entrambi i debiti sono scaduti ma il secondo è garantito da un pegno. Se egli versa 2.000 euro al suo creditore, quale debito s'intende estinto?","opts":["Il debito che il debitore dichiara di voler soddisfare.","Il debito indicato dal creditore.","Il debito non garantito da pegno, qualunque sia la volontà delle parti."]},{"id":1286,"area":"civ","q":"Come si definisce la produzione di interessi sugli interessi scaduti?","opts":["Anatocismo.","Anticresi.","Sinallagma"]},{"id":1287,"area":"civ","q":"Il Sig. Lastrico, versando in disastrose condizioni finanziarie, chiede al Sig. Strozzini la concessione di un mutuo. Il Sig. Strozzini acconsente, ma dispone che, alla scadenza del termine, la somma imprestata maturerà interessi di gran lunga esorbitanti rispetto al saggio legale. Non potendo più adempiere al pagamento degli stessi, quale rimedio potrà invocare il Sig. Lastrico?","opts":["Nessuno, dal momento che il Sig. Lastrico ha partecipato alla fissazione convenzionale del tasso di interessi.","Può far dichiarare parzialmente nulla la clausola che stabilisce gli interessi usurari, e ridurre quest'ultimi al tasso legale.","Può far dichiarare la nullità totale della suddetta clausola con la conseguenza che gli interessi non sono dovuti."]},{"id":1288,"area":"civ","q":"Il mutuatario, a saldo del debito, corrisponde anche gli interessi di un ammontare superiore al tasso legale. Potrà egli ottenere la restituzione di quest'ultimi?","opts":["Sì, attraverso l'esercizio della \"azione di ingiustificato arricchimento\"","Sì, configurandosi un'ipotesi di \"indebito oggettivo\".","No, perché tale pagamento viene ritenuto come adempimento di una \"obbligazione naturale\""]},{"id":1289,"area":"civ","q":"A norma del codice civile, non essendo alcunchè pattuito tra le parti, nell'adempiere l'obbligazione il debitore:","opts":["Deve usare la diligenza del buon padre di famiglia","Deve usare la diligenza richiesta dal creditore","Può usare la diligenza che ritiene più idonea al soddisfacimento dei propri interessi"]},{"id":1290,"area":"civ","q":"Quando l'obbligazione ha per oggetto la prestazione di cose determinate soltanto nel genere, di quale qualità devono essere le cose che il debitore deve prestare?","opts":["Di qualsiasi qualità, ma usando la diligenza del buon padre di famiglia","Di qualità non inferiore alla media","Della migliore qualità"]},{"id":1291,"area":"civ","q":"Può il creditore rifiutare l'adempimento offertogli da un terzo?","opts":["No, ma solo nel caso sia a conoscenza dello stato di insolvenza del debitore","Sì, se il debitore gli ha manifestato la sua opposizione","Si, sempre"]},{"id":1292,"area":"civ","q":"Il termine fissato per l'adempimento, nel silenzio del titolo costitutivo dell'obbligazione, si presume:","opts":["A favore del creditore","A favore di entrambi","A favore del debitore"]},{"id":1293,"area":"civ","q":"Il debitore che ha eseguito la prestazione dovuta può impugnare il pagamento a causa della propria incapacità?","opts":["No, mai","Sì, sempre","Sì, purchè il suo rappresentante legale provi che ciò che fu pagato non é stato rivolto a vantaggio del creditore"]},{"id":1294,"area":"civ","q":"Il debitore Caio in luogo della prestazione dovuta al creditore Mevio esegue, con il consenso di quest'ultimo, una prestazione diversa consistente nel trasferimento della proprietà di una cosa. Se la cosa trasferita risulta affetta da vizi che la rendono inidonea all'uso a cui è destinata e Mevio non intende avvalersi delle norme sulla garanzia per vizi nella vendita, egli può esigere:","opts":["La prestazione originaria e il risarcimento del danno","La prestazione originaria o il risarcimento del danno","Solo il risarcimento del danno"]},{"id":1295,"area":"civ","q":"A norma del codice civile in quale dei seguenti casi ha luogo di diritto la surrogazione?","opts":["A vantaggio del conduttore di un immobile che, fino alla concorrenza del canone capitalizzato, paga uno o più creditori a favore dei quali l'immobile è ipotecato","A vantaggio del legatario di beni mobili che paga con danaro proprio tutti i debiti ereditari","A vantaggio di chi, essendo creditore, ancorchè chirografario, paga un altro creditore che ha diritto di essergli preferito in ragione delle sue ipoteche"]},{"id":1296,"area":"civ","q":"Quando il creditore è in mora:","opts":["Il rischio della sopravvenuta impossibilità della prestazione per causa non imputabile al debitore incombe solo sul creditore","Il rischio della sopravvenuta impossibilità della prestazione per causa non imputabile al debitore incombe sul debitore se la prestazione ha per oggetto una cosa determinata, sul creditore in ogni altro caso","Il rischio della sopravvenuta impossibilità della prestazione per causa non imputabile al debitore incombe solo sul debitore medesimo"]},{"id":1297,"area":"civ","q":"A norma del codice civile, si estingue l'obbligazione quando le parti sostituiscono all'obbligazione originaria una nuova obbligazione con oggetto diverso e la volontà di estinguere l'obbligazione precedente risulta in modo non equivoco?","opts":["No","Sì","No, salvo che l'obbligazione originaria abbia ad oggetto una somma di danaro"]},{"id":1298,"area":"civ","q":"In quale delle seguenti ipotesi si verifica la compensazione legale?","opts":["Tra due debiti che hanno per oggetto una somma di danaro e che sono ugualmente liquidi ed esigibili","Tra due debiti che hanno per oggetto una somma di danaro di pari importo e che sono pagabili nello stesso luogo, anche se non sono ugualmente liquidi ed esigibili","Tra due debiti che hanno per oggetto la restituzione di cose non fungibili depositate"]},{"id":1299,"area":"civ","q":"A norma del codice civile, la cessione del credito ha effetto nei confronti del debitore ceduto","opts":["Quando questi l'ha accettata o quando gli è stata notificata","Solo quando risulta da atto scritto avente data certa","Solo quando questi ha prestato il suo consenso contestualmente alla cessione"]},{"id":1300,"area":"civ","q":"In caso di espromissione, se l'obbligazione assunta dal nuovo debitore verso il creditore è dichiarata nulla o annullata e il creditore aveva liberato il debitore originario:","opts":["L'obbligazione del debitore originario rivive solo se questi vi consenta","L'obbligazione del debitore originario non rivive","L'obbligazione del debitore originario rivive ma il creditore non può valersi delle garanzie prestate da terzi"]},{"id":1301,"area":"civ","q":"Nel caso di obbligazione solidale tra più creditori, la remissione fatta da uno di essi:","opts":["Libera il debitore verso gli altri creditori solo per la parte spettante al creditore che ha fatto la remissione","Libera il debitore verso gli altri creditori per l'intero credito","Non libera il debitore verso gli altri creditori nemmeno per la parte spettante al creditore che ha fatto la remissione"]},{"id":1302,"area":"civ","q":"Tizio ha assunto nei confronti di Caio una obbligazione alternativa per la quale, a scelta del creditore, dovrà restaurare gli affreschi della villa di proprietà di Caio o, alternativamente, restaurargli un quadro antico. Se la prestazione di restaurare il quadro antico diviene impossibile per colpa del creditore Caio, il debitore:","opts":["E' liberato dall'obbligazione e non può essere obbligato ad eseguire l'altra prestazione","E' in ogni caso obbligato ad eseguire l'altra prestazione e non ha diritto ad alcun risarcimento del danno","E' liberato dall'obbligazione, salvo che il creditore preferisca esigere l'altra prestazione e risarcire il danno"]},{"id":1303,"area":"civ","q":"Nel caso di obbligazione solidale tra più creditori, la rinunzia alla prescrizione fatta dal debitore in confronto di uno solo di essi, giova agli altri creditori?","opts":["Sì","No","No, salvo che si tratti di obbligazione pecuniaria"]},{"id":1304,"area":"civ","q":"Quale tra questi negozi non può essere concluso tramite rappresentante?","opts":["Compravendita","Contratto preliminare","Testamento"]},{"id":1305,"area":"civ","q":"Il falso rappresentante è colui che:","opts":["Agisce come tale, ma in mancanza o in eccesso di potere","Agisce non perseguendo l'interesse del rappresentato","E' indicato dal creditore per ricevere la prestazione"]},{"id":1306,"area":"civ","q":"Marco stipula con Luca la vendita di un podere, ma in una controscrittura le parti affermano il carattere simulato di tale vendita. Ciò nondimeno Luca pretende di prendere possesso dell'immobile e di goderne come proprietario. Marco si rivolge all'autorità giudiziaria facendo valere la simulazione contro le pretese di Luca. Sarà Marco tutelato?","opts":["Sì, la vendita simulata non ha effetto e quindi proprietario dell'immobile resta Marco","No, la simulazione non può ricevere alcun riconoscimento giuridico per cui Luca deve considerarsi legittimo proprietario","Sì, a meno che la simulazione non sia stata pattuita in frode ai creditori"]},{"id":1308,"area":"civ","q":"In quale di questi casi il contratto è nullo?","opts":["In caso di apposizione di una condizione potestativa","In caso di apposizione di una condizione sospensiva impossibile","In caso di apposizione di una condizione risolutiva impossibile"]},{"id":1309,"area":"civ","q":"Cos'è una condizione mista?","opts":["Una condizione futura ma certa","Una condizione possibile e lecita","Una condizione casuale e potestativa allo stesso tempo"]},{"id":1310,"area":"civ","q":"Il giovane Felice de Furbettis ha inteso contrarre matrimonio con Ermenegilda, unica figlia del comm.Onassio, alla sola condizione che l'anziano padre doni l'appartamento di sua proprietà alla coppia. Il matrimonio è:","opts":["Valido ma la condizione si considera non apposta","Annullabile su iniziativa di ciascuno dei coniugi","Nullo, salvo gli effetti del matrimonio putativo"]},{"id":1311,"area":"civ","q":"Quando l'errore è causa di annullamento del contratto?","opts":["Quando è determinante","Quando è essenziale e riconoscibile","Quando è essenziale"]},{"id":1312,"area":"civ","q":"Fritz von Richter, giunto ad Ischia per trascorrervi le ferie, decide di acquistare un orologio presso il venditore ambulante Angelo Magliari. A causa della sua scarsa conoscenza della lingua italiana, dichiara di offrire 1000 euro, somma palesemente eccessiva rispetto al valore dell'orologio, ritenendo in realtà di offrirne 100 euro. Il Magliari pretende il pagamento della somma offerta dal von Richter, ma questi, accortosi dell'errore, rifiuta di pagare eccependo l'invalidità del contratto. E' fondato il rifiuto del von Richter?","opts":["Sì, perché il contratto è nullo per mancanza di volontà","Sì, perché il contratto è annullabile per errore ostativo","Sì, perché il contratto è annullabile per errore vizio"]},{"id":1313,"area":"civ","q":"Quale di questi errori è normalmente irrilevante nel contratto?","opts":["Errore sulla natura del negozio","Errore sui motivi","Errore sull'identità dell'oggetto della prestazione"]},{"id":1314,"area":"civ","q":"Il sig.Furbetti da lungo tempo aspira ad acquistare un prezioso dipinto appartenente al sig.Furfante, suo vicino di casa. Un giorno, l'aspirante acquirente, venuto fortuitamente a conoscenza di un grave reato commesso dal sig.Furfante, minaccia quest'ultimo di denunciarlo all'autorità giudiziaria se non acconsente a vendergli il dipinto. Il sig.Furfante, costretto dalla minaccia, acconsente alla vendita. E' valida tale vendita?","opts":["Sì, perché la violenza morale non è ingiusta quando si minaccia di far valere un diritto","No, è annullabile perché il sig.Furbetti ha mirato a conseguire un vantaggio ingiusto","No, salvo che il sig.Furfante risulti innocente"]},{"id":1315,"area":"civ","q":"Il signor De Ingenuis, indotto con artifici e raggiri dal dott.Furbonio, conclude un contratto con l'ingegnere Innocenti. Quale sarà il regime giuridico del contratto così concluso?","opts":["Il contratto è sempre annullabile","Il contratto è annullabile solo se la controparte ha conseguito un vantaggio","Il contratto è annullabile se i raggiri del terzo erano noti al contraente che ne ha tratto vantaggio"]},{"id":1316,"area":"civ","q":"In quale caso il contratto è sempre annullabile?","opts":["In caso in cui esso sia stato concluso a causa di timore reverenziale","In caso di violenza morale esercitata da un terzo","In caso di errore di calcolo"]},{"id":1317,"area":"civ","q":"Da chi può essere domandato, di regola, l'annullamento del contratto?","opts":["Da chiunque vi abbia un interesse","Solo dalla parte nel cui interesse esso è stato stabilito dalla legge","Da entrambe le parti"]},{"id":1318,"area":"civ","q":"In quanti anni si prescrive il diritto ad ottenere l'annullamento del contratto?","opts":["10 anni","E' imprescrittibile","5 anni"]},{"id":1319,"area":"civ","q":"In quanti anni si prescrive il diritto ad opporre, alla richiesta di adempimento, l'eccezione di annullabilità del contratto?","opts":["10 anni","3 anni","E' imprescrittibile"]},{"id":1320,"area":"civ","q":"In un contratto plurilaterale l'annullabilità che riguarda il vincolo di una sola delle parti cosa determina?","opts":["L'annullamento dell'intero contratto, nel solo caso di violenza","L'annullamento dell'intero contratto in ogni caso","Mai l'annullamento dell'intero contratto, salvo che la partecipazione della parte interessata all'annullamento debba considerarsi essenziale"]},{"id":1321,"area":"civ","q":"E' possibile stabilire in un negozio la prestazione di cose future?","opts":["Sì, salvo particolari divieti","Sì, ma solo in alcuni casi stabiliti dalla legge","Sempre"]},{"id":1322,"area":"civ","q":"Quando si ha arbitraggio?","opts":["Quando l'arbitro designato dalle parti per la soluzione di eventuali controversie decide secondo equità","Nel caso in cui le parti abbiano affidato la determinazione della prestazione ad un terzo","Nel caso in cui nell'arbitrato rituale l'arbitro designato rifiuti l'incarico"]},{"id":1323,"area":"civ","q":"Per causa di un negozio si intende:","opts":["Il motivo per cui le parti hanno agito","La funzione economico-sociale che il negozio realizza","L'eventuale controversia che può sorgere dal negozio"]},{"id":1324,"area":"civ","q":"Guido è intenzionato ad acquistare di seconda mano un'automobile dal garagista Furbetti. Quest'ultimo, attraverso accorte manomissioni del motore, inganna l'acquirente circa le condizioni dell'autovettura, riuscendo così ad ottenere un prezzo più alto di quello corrispondente al valore effettivo di essa. In seguito, Guido si accorge dell'inganno; di quale rimedio può avvalersi?","opts":["Del risarcimento del danno","Dell'annullamento del contratto","Della rescissione, ma solo se il prezzo pagato supera il doppio del valore dell'automobile"]},{"id":1325,"area":"civ","q":"Qual è la condizione giuridica del contratto concluso dal rappresentante in conflitto di interessi con il rappresentato?","opts":["Inefficacia","Annullabilità","Nullità"]},{"id":1326,"area":"civ","q":"Quando si verifica un'ipotesi di conversione formale del negozio?","opts":["Quando un atto pubblico vale come scrittura privata","Quando il negozio diretto a costituire una servitù di passaggio crea un diritto personale di passaggio","Quando il negozio di compravendita vale invece a determinare una permuta"]},{"id":1327,"area":"civ","q":"Qual è la forma che deve rivestire la procura?","opts":["Atto pubblico","Scrittura privata","La stessa forma prescritta per il negozio che autorizza a compiere"]},{"id":1328,"area":"civ","q":"Chi può pretendere l'adempimento dell'onere (o \"modus\")?","opts":["Colui che ha donato o testato","Solo il danneggiato dall'inadempimento","Qualunque interessato"]},{"id":1330,"area":"civ","q":"In previsione di una regata internazionale di barche a vela il fotografo Di Napoli conclude con la sig.ra Locatelli un contratto di locazione, per una sola giornata e a prezzo alquanto elevato, di una stanza panoramica dalla quale può agevolmente effettuare le riprese fotografiche. A causa del maltempo, la competizione marina viene rinviata a data da destinarsi. A questo punto, potrà il fotografo Di Napoli ritenersi liberato dal vincolo contrattuale?","opts":["Sì, ma solo attraverso l'esercizio della \"azione di rescissione\" del contratto","Sì, perché l'evento sportivo (la regata internazionale di barche a vela) rappresenta il solo ed unico presupposto oggettivo della stipulazione contrattuale","Sì, ma solo se è ancora possibile dare un preavviso di quindici giorni alla controparte"]},{"id":1331,"area":"civ","q":"Come si atteggiano gli atti di disposizione compiuti in pendenza della condizione?","opts":["Sono sempre impugnabili dall'altro contraente","Sono sempre validi, ma gli effetti restano subordinati alla stessa condizione","Sono nulli unicamente se il contratto è sottoposto a condizione risolutiva"]},{"id":1332,"area":"civ","q":"Come si definisce la procura quando riguarda solo un affare o una speciale categoria di affari?","opts":["Speciale","Specifica","Espressa"]},{"id":1333,"area":"civ","q":"Quando si verifica una interposizione reale?","opts":["In caso di rappresentanza indiretta","In caso di simulazione di persona","In caso di contratto a favore di terzo"]},{"id":1334,"area":"civ","q":"Bruto dà procura a Cassio per vendere un appartamento per una somma non inferiore ai 50.000 euro; Cassio, pur avendo ricevuto un'offerta di 80.000 euro, vende l'appartamento ad un suo congiunto per 50.000 euro. Quale figura ricorre in questo caso?","opts":["Eccesso di potere rappresentativo","Difetto di potere rappresentativo","Abuso di potere rappresentativo"]},{"id":1335,"area":"civ","q":"Gerolamo Sensale loca a Celestina Ruffianetti un appartamento affinchè la stessa vi organizzi una casa di appuntamenti. Quale sarà il regime giuridico di tale contratto di locazione?","opts":["Il contratto è nullo per illiceità del motivo","Il contratto è annullabile per illiceità del motivo","Il contratto è inesistente per illiceità del motivo"]},{"id":1336,"area":"civ","q":"Qual è la condizione giuridica del contratto concluso da una persona che, sebbene non interdetta, era incapace d'intendere o di volere al momento della conclusione stessa?","opts":["E' nullo","E' annullabile solo quando lo stato d'incapacità era riconoscibile dall'altro contraente","E' annullabile solo quando risulta la malafede dell'altro contraente"]},{"id":1337,"area":"civ","q":"Friz, in qualità di rappresentante di Gerald, compera un'automobile, ma il suo consenso risulta viziato da un errore. Quale sarà in questo caso la condizione giuridica del contratto?","opts":["Annullabile perché rileva la volontà del rappresentante","Risolubile","Nullo"]},{"id":1338,"area":"civ","q":"Per l'attribuzione del potere di rappresentanza volontaria è necessaria la capacità di agire:","opts":["Del solo rappresentante","Del solo rappresentato","Di entrambi"]},{"id":1339,"area":"civ","q":"E' ammissibile la conversione di un negozio nullo per contrarietà ad una norma imperativa?","opts":["No, la conversione è possibile solo per i negozi annullabili","No, perché la nullita è inerente non già allo strumento negoziale utilizzato bensì all'intento pratico avuto di mira dalle parti","Sì, sempre che entrambe le parti lo consentano"]},{"id":1340,"area":"civ","q":"Quale fra le seguenti non è una causa di nullità del contratto?","opts":["La mancanza della forma richiesta ad substantiam","La mancanza o l'illiceità della causa","La coartazione della volontà di una delle parti mediante violenza non fisica"]},{"id":1341,"area":"civ","q":"Quale fra i seguenti non è un carattere tipico della nullità?","opts":["Rilevabilità d'ufficio","Imprescrittibilità","Efficacia irretroattiva della dichiarazione di nullità"]},{"id":1342,"area":"civ","q":"La convalida è:","opts":["Il negozio col quale il soggetto legittimato a proporre l'azione di annullamento dichiara di voler sanare il vizio del negozio stesso","Il fenomeno per cui un negozio nullo può produrre gli effetti di un negozio diverso del quale contenga i requisiti di sostanza e di forma","L'atto col quale l'interessato approva e fa proprio il negozio compiuto dal rappresentante senza potere"]},{"id":1343,"area":"civ","q":"Quale elemento accidentale del negozio è contenuto nell'espressione \"ti regalerò l'orologio quando compirai 18 anni\"?","opts":["Una condizione sospensiva","Una condizione risolutiva","Un termine"]},{"id":1344,"area":"civ","q":"In quale di questi negozi il motivo erroneo, se rilevante, rende nullo il negozio?","opts":["Adozione","Cessione del credito","Testamento"]},{"id":1345,"area":"civ","q":"Che cosa si intende esattamente con l'espressione \"conclusione del contratto\"?","opts":["La restituzione delle prestazioni dedotte nel contratto","La completa esecuzione di tutte le obbligazioni nascenti dal contratto","Il sorgere del vincolo contrattuale"]},{"id":1346,"area":"civ","q":"Nell'interpretazione del contratto, per ricercare la comune intenzione delle parti può prendersi in considerazione il loro comportamento?","opts":["Sì, l'interprete dovrà tener conto del comportamento delle parti anteriore alla conclusione del contratto","Sì, per determinare la comune intenzione delle parti dovrà valutarsi il loro comportamento complessivo anche posteriore alla conclusione del contratto","No, la volontà delle parti deve desumersi esclusivamente dal significato logico delle parole usate nel contratto"]},{"id":1347,"area":"civ","q":"A norma dell'art.1322 c.c, è riconosciuta alle parti la libertà di stipulare contratti atipici cioè diversi da quelli previsti espressamente dalla legge. A quale condizione ciò è possibile?","opts":["Purchè tali contratti si riferiscano a rapporti aventi un contenuto patrimoniale","Purchè siano diretti a realizzare interessi meritevoli di tutela secondo l'ordinamento giuridico","Purchè richiamino elementi propri di diversi contratti tipici"]},{"id":1348,"area":"civ","q":"Il signor Generoso Regalini, in procinto di farsi costruire una lussuosa villa, dona al suo amico Senzatetto la futura dependance dell'immobile, rispettando la forma prescritta dalla legge per tale tipo di contratto. Tale donazione è:","opts":["Pienamente valida","Annullabile da parte del soggetto interessato, ossia dal donante","Assolutamente nulla"]},{"id":1349,"area":"civ","q":"Il signor Miraballi, titolare di una piccola impresa, nell'esercizio della stessa, è in procinto di concludere un contratto con una ditta fornitrice. Sfortuna vuole che, prima della conclusione del contratto, il signor Miraballi muoia. La sua proposta è:","opts":["Priva di efficacia","Valida ed efficace, ma irrevocabile dal successore, il quale non può arrogarsi un potere (quello di revoca ) che spettava esclusivamente al suo predecessore","Pienamente valida ed efficace, ma l'accettazione deve intervenire entro tre giorni dalla notizia della morte"]},{"id":1350,"area":"civ","q":"Quando, un contratto, può definirsi \"di carattere personale\"?","opts":["Quando il contratto prevede, a carico di una parte, una prestazione di \"fare\"","Allorchè la considerazione dell'identità del contraente, o delle sue qualità personali, risulti, alla stregua di una valutazione obiettiva, determinante del consenso","Quando il contratto deve essere concluso personalmente, e non già \"per interposte persone\""]},{"id":1351,"area":"civ","q":"L'esposizione della merce in vetrina costituisce:","opts":["Una proposta pura e semplice","Una promessa al pubblico","Un'offerta al pubblico"]},{"id":1352,"area":"civ","q":"Il Banco di Apricena promette al signor Senzasoldi un mutuo di 50.000 euro per l'acquisto di un appartamento; nell'ipotesi in cui il Banco di Apricena non adempia all'obbligo assunto con la promessa di mutuo, che cosa può chiedere il signor Senzasoldi?","opts":["Nulla, la promessa di mutuo non è vincolante","L'esecuzione specifica dell'obbligo di concludere il contratto","La risoluzione del contratto preliminare per inadempimento e la condanna dell'inadempiente al risarcimento dei danni"]},{"id":1353,"area":"civ","q":"Se il terzo a favore del quale è stato stipulato un contratto dichiara di non voler profittare della stipulazione:","opts":["Il contratto è inefficace, salvo che risulti diversamente dalla volontà delle parti","La prestazione rimane a beneficio dello stipulante, salvo sia pattuito diversamente o sia impossibile per la natura del contratto","Il contratto è annullabile su richiesta dello stipulante"]},{"id":1354,"area":"civ","q":"Quali sono gli elementi o requisiti essenziali del contratto?","opts":["L'accordo delle parti, la causa, il termine, l'oggetto, la condizione e la forma se richiesta dalla legge a pena di nullità","L'accordo delle parti, la causa, l'oggetto e la forma quando è richiesta dalla legge a pena di nullità","L'accordo delle parti, la causa, l'oggetto e il termine"]},{"id":1356,"area":"civ","q":"Un genitore decide di stipulare un'assicurazione sulla vita a favore di suo figlio. A tale scopo egli si rivolge ad una società assicuratrice, la quale si assume l'obbligo di versare l'importo dell'assicurazione al figlio nel caso di morte del genitore. Di quale figura giuridica si tratta?","opts":["Contratto con obbligazioni del solo proponente","Contratto a favore del terzo","Contratto per conto di chi spetta"]},{"id":1357,"area":"civ","q":"Quale f

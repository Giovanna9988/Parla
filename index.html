<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Parla · 意大利语进阶导师</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Parla">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#d96a3f">
<style>
:root{
  --bg:#f6f5f2; --surface:#ffffff; --surface-2:#f0eee9; --text:#1c1b19; --text-soft:#6b6864;
  --line:#e6e3dd; --accent:#d96a3f; --accent-soft:#fbe9e0; --accent-2:#2f6f8f;
  --ok:#3a9d6b; --warn:#d98e2b; --bubble-me:#d96a3f; --bubble-me-text:#fff;
  --bubble-ai:#ffffff; --shadow:0 6px 24px rgba(40,30,20,.08); --radius:20px;
  --font:'Inter','SF Pro Display','Manrope',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
}
[data-theme="dark"]{
  --bg:#16151a; --surface:#1f1e25; --surface-2:#26242d; --text:#f1efe9; --text-soft:#9b988f;
  --line:#2e2c36; --accent:#e8794d; --accent-soft:#39281f; --accent-2:#5aa6c8;
  --bubble-ai:#26242d; --shadow:0 6px 28px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;justify-content:center;overflow:hidden}
.app{width:100%;max-width:100%;height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--bg)}
/* 桌面端铺满屏幕，但正文列居中保持可读 */
.modebar,#bannerWrap,#reBar,.chat{width:100%;max-width:900px;margin-left:auto;margin-right:auto}
.composer .cbox{max-width:900px;margin-left:auto;margin-right:auto}
header{max-width:100%}

/* ---------- Header ---------- */
header{
  display:flex;align-items:center;gap:12px;padding:12px 16px;background:color-mix(in srgb,var(--surface) 80%,transparent);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:20
}
.brand{font-weight:800;font-size:18px;letter-spacing:-.5px;display:flex;align-items:center;gap:7px}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
.h-spacer{flex:1}
.ring{position:relative;width:42px;height:42px;cursor:pointer}
.ring svg{transform:rotate(-90deg)}
.ring .lvl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.streak{display:flex;align-items:center;gap:4px;font-weight:700;font-size:14px;background:var(--surface-2);padding:6px 10px;border-radius:14px;cursor:pointer}
.icon-btn{width:38px;height:38px;border:none;background:var(--surface-2);border-radius:12px;cursor:pointer;font-size:17px;color:var(--text);display:flex;align-items:center;justify-content:center;transition:.15s}
.icon-btn:hover{background:var(--line)}

/* ---------- Mode bar ---------- */
.modebar{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--line);background:var(--surface)}
.modebar::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;border:1px solid var(--line);background:var(--surface);color:var(--text-soft);padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px var(--accent-soft)}
.chip:not(.active):hover{border-color:var(--accent)}
/* 手机端：模式栏自动换行，不再横向滚动 */
@media (max-width:600px){.modebar{flex-wrap:wrap;overflow-x:visible}.chip{font-size:12.5px;padding:7px 12px}}

/* ---------- Chat ---------- */
.chat{flex:1;overflow-y:auto;padding:18px 16px 8px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.msg{max-width:86%;display:flex;flex-direction:column;gap:6px;animation:rise .35s ease}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.msg.ai{align-self:flex-start}
.msg.me{align-self:flex-end;align-items:flex-end}
.bubble{padding:12px 15px;border-radius:var(--radius);font-size:15.5px;line-height:1.55;word-wrap:break-word;box-shadow:var(--shadow)}
.ai .bubble{background:var(--bubble-ai);border-bottom-left-radius:6px}
.me .bubble{background:var(--bubble-me);color:var(--bubble-me-text);border-bottom-right-radius:6px}
.bubble.masked{cursor:pointer;user-select:none;color:transparent;text-shadow:0 0 11px rgba(120,116,110,.75)}
.bubble.masked w{color:transparent}
.ai .bubble w{cursor:pointer;border-bottom:1.5px dotted transparent;transition:.12s}
.ai .bubble w:hover{border-bottom-color:var(--accent);color:var(--accent)}
.row{display:flex;align-items:center;gap:8px}
.tts{border:none;background:var(--surface-2);color:var(--text-soft);width:28px;height:28px;border-radius:9px;cursor:pointer;font-size:13px}
.suggests{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
.sg{font-size:13px;background:var(--surface);border:1px dashed var(--accent);color:var(--accent);padding:7px 11px;border-radius:13px;cursor:pointer;transition:.15s}
.sg:hover{background:var(--accent-soft)}
.correction{background:var(--accent-soft);border-left:3px solid var(--accent);border-radius:10px;padding:9px 12px;font-size:13px;line-height:1.5;margin-top:2px}
.correction .x{color:var(--text-soft);text-decoration:line-through}
.correction .v{color:var(--ok);font-weight:700}
.correction .why{display:block;color:var(--text-soft);margin-top:3px}
.typing{display:flex;gap:4px;padding:14px 16px}
.typing span{width:8px;height:8px;border-radius:50%;background:var(--text-soft);opacity:.5;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

/* ---------- Input ---------- */
.composer{padding:10px 14px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:var(--surface)}
.cbox{display:flex;align-items:flex-end;gap:8px;background:var(--surface-2);border-radius:22px;padding:6px 6px 6px 14px;border:1px solid var(--line)}
.cbox textarea{flex:1;border:none;background:transparent;resize:none;font-family:var(--font);font-size:15px;color:var(--text);max-height:120px;line-height:1.4;padding:7px 0;outline:none}
.send,.mic,.hint{border:none;cursor:pointer;border-radius:50%;width:40px;height:40px;font-size:17px;display:flex;align-items:center;justify-content:center;flex:none;transition:.15s}
.send{background:var(--accent);color:#fff}.send:disabled{opacity:.4;cursor:default}
.mic{background:transparent;color:var(--text-soft)}.mic.rec{background:#e0413f;color:#fff;animation:pulse 1s infinite}
.hint{background:transparent;color:var(--text-soft);font-size:15px}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* ---------- Panels / Modal ---------- */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);z-index:40;display:none;align-items:flex-end;justify-content:center}
.overlay.show{display:flex;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surface);width:100%;max-width:560px;border-radius:24px 24px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:88dvh;overflow-y:auto;animation:up .28s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet h2{font-size:18px;margin-bottom:4px}
.sheet .sub{color:var(--text-soft);font-size:13px;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
.field input,.field select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:var(--surface-2);color:var(--text);font-size:14px;font-family:var(--font)}
.field .help{font-size:12px;color:var(--text-soft);margin-top:5px;line-height:1.5}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.opt{padding:11px;border:1px solid var(--line);border-radius:12px;font-size:13px;cursor:pointer;background:var(--surface-2);text-align:center;transition:.15s}
.opt.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:700}
.btn{width:100%;padding:13px;border:none;border-radius:14px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.btn.ghost{background:var(--surface-2);color:var(--text)}
.vocab-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}
.vocab-item b{color:var(--accent)}
.vocab-item .zh{color:var(--text-soft);font-size:13px}
.empty{text-align:center;color:var(--text-soft);font-size:13px;padding:30px 0}
.popover{position:absolute;z-index:60;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:13px;max-width:260px;font-size:13px;line-height:1.5;display:none}
.popover.show{display:block;animation:fade .15s}
.popover b{color:var(--accent);font-size:15px}
.popover .pos{color:var(--text-soft);font-style:italic;margin-left:5px}
.popover .ex{display:block;margin-top:6px;color:var(--text-soft)}
.popover .add{margin-top:9px;width:100%;padding:8px;border:none;border-radius:9px;background:var(--accent-soft);color:var(--accent);font-weight:700;cursor:pointer;font-size:12px}
.banner{margin:10px 16px 0;padding:11px 13px;border-radius:13px;background:var(--accent-soft);color:var(--accent);font-size:13px;line-height:1.5;display:flex;gap:8px;align-items:flex-start}
.banner b{cursor:pointer;text-decoration:underline}
.stat{display:flex;gap:10px;margin:8px 0 16px}
.stat .c{flex:1;background:var(--surface-2);border-radius:14px;padding:12px;text-align:center}
.stat .c b{display:block;font-size:22px}.stat .c span{font-size:11px;color:var(--text-soft)}
#reBar:empty{display:none}
#reBar{display:flex;align-items:center;gap:10px;margin:8px 16px 0;padding:9px 13px;border-radius:13px;background:var(--accent-soft);color:var(--accent);font-size:13px;font-weight:700}
#reBar .grow{flex:1}
#reBar button{border:none;background:var(--accent);color:#fff;font-weight:700;font-size:13px;padding:8px 13px;border-radius:11px;cursor:pointer}
#reBar button:disabled{opacity:.4}
.recap-list{font-size:14px;line-height:1.7}
.recap-list li{margin-left:18px}
</style>
</head>

da parte di un notaio o un pubblico ufficiale, conferendo al contratto un valore legale superiore. Si dicono formali, o solenni, quei contratti per cui la legge richiede un determinato requisito di forma. A forma libera gli altri. La forma scritta è obbligatoria in alcune circostanze e per specifici tipi di contratti, come ad esempio:","a":"civ"},{"n":382,"q":"CHI HA IN MANO IL BENE IPOTECATO?","a":"civ"},{"n":383,"q":"QUALI SONO I GRADI DELL' IPOTECA?","a":"civ"},{"n":384,"q":"QUALI SONO LE CAUSE DI ANNULLABILITÁ DEL CONTRATTO?","a":"civ"},{"n":385,"q":"DIFFERENZA TRA NULLITÀ E ANNULLABILITÀ La nullità e l'annullabilità sono due concetti giuridici fondamentali che riguardano la validità di un contratto, ma presentano differenze significative che è utile comprendere. La nullità si verifica quando un contratto è considerato completamente privo di effetti giuridici fin dal momento in cui viene stipulato. In sostanza, un contratto nullo non produce alcun effetto legale, come se non fosse mai esistito. Le cause di nullità possono includere vari fattori, come la presenza di un oggetto illecito, una causa illegittima, o la mancanza di elementi essenziali, quali l'accordo tra le parti o un oggetto lecito. Un aspetto importante della nullità è che chiunque possa dimostrare l'inesistenza del contratto ha il diritto di farne dichiarare la nullità, e il giudice può anche intervenire d'ufficio per riconoscerla. Inoltre, non ci sono limiti di tempo per contestare un contratto nullo, il che lo rende inoppugnabile. L'annullabilità si riferisce a contratti che, pur essendo validi e producendo effetti giuridici, possono essere invalidati a causa di vizi del consenso o altre irregolarità. A differenza della nullità, un contratto annullabile rimane valido fino a quando non viene formalmente annullato. Le cause comuni di annullabilità includono errori, dolo (inganno), coazione (costrizione) e incapacità delle parti. Un contratto annullabile continua a produrre effetti finché non viene richiesta l'annullamento, e chi desidera annullare il contratto deve farlo entro un termine specifico noto come termine di decadenza. Solo le parti interessate possono richiedere l'annullamento, e questo deve avvenire entro i tempi previsti dalla legge.","a":"civ"},{"n":386,"q":"SPIEGARE TUTTI I TIPI DI CONTRATTI DI LOCAZIONE E LE LORO DIFFERENZE","a":"civ"},{"n":387,"q":"SUCCESSIONE E DONAZIONE La successione e la donazione sono due modalità principali di trasferimento dei beni. La successione avviene quando una persona muore (il de cuius) e i suoi beni vengono trasferiti agli eredi. Ci sono due tipologie di successione:","a":"gen"},{"n":388,"q":"USUFRUTTO E NUDA PROPRIETÀ","a":"civ"},{"n":389,"q":"COSA ACCADE QUANDO DECEDE UNO DEI SOGGETTI INTERESSATI NELLA COMPRAVENDITA? QUALI SONO E COSA SONO I DIRITTI REALI DI GODIMENTO? Quando uno dei soggetti in una compravendita muore, le conseguenze legali variano a seconda di chi è deceduto.","a":"civ"},{"n":390,"q":"COS'È L'USUFRUTTO? L’usufrutto è un diritto reale di godimento che consente a una persona, chiamata usufruttuario, di utilizzare e godere di un bene che in realtà appartiene a un’altra persona, nota come nudo proprietario. L’usufrutto permette all'usufruttuario di trarre vantaggio dal bene, sia attraverso il suo utilizzo diretto che mediante i frutti che questo produce. Questi frutti possono essere di natura naturale, come il raccolto di un campo o i frutti di un albero, oppure civili, come il canone d’affitto derivante dalla locazione di un immobile. Una delle caratteristiche principali dell'usufrutto è la sua natura temporanea. Questo diritto viene generalmente stabilito per un periodo determinato o, molto frequentemente, per la vita dell'usufruttuario. Alla scadenza di questo termine o al momento della morte dell'usufruttuario, il diritto si estingue e il bene torna nella piena disponibilità del nudo proprietario. L'usufruttuario ha quindi la possibilità di utilizzare il bene a proprio piacimento. Può vivere in un immobile, affittarlo per generare reddito o utilizzarlo per scopi produttivi. Tuttavia, questa facoltà viene accompagnata da alcune responsabilità: l'usufruttuario è obbligato a mantenere il bene in buono stato e a fare le necessarie riparazioni ordinarie. È importante notare che l’usufruttuario non può modificare la destinazione d’uso del bene o compiere atti che possano comprometterne il valore senza il consenso del nudo proprietario. Ad esempio, non può apportare modifiche strutturali all’immobile senza autorizzazione. L’usufrutto può essere costituito tramite un testamento oppure attraverso un contratto formale stipulato tra le parti. In alcune situazioni, la legge stessa può sancire la creazione di un usufrutto, ad esempio in caso di successione. Ci sono diversi motivi per cui l'usufrutto può estinguersi :","a":"trib"},{"n":391,"q":"COS'È L'USO COSA SONO I \"VIZI DI VOLONTA'? FARE ESEMPI","a":"gen"},{"n":392,"q":"QUALI SONO GLI OBBLIGHI DELL'USUFRUTTUARIO?","a":"gen"},{"n":393,"q":"COS'È L'INVENTARIO NELL'USUFRUTTO?","a":"civ"},{"n":394,"q":"DEFINIZIONE DI USUFRUTTO E SPIEGAZIONE DEI","a":"civ"},{"n":395,"q":"SERVITÚ DA ELETTRODOTTO","a":"gen"},{"n":396,"q":"CALCOLO INDENNIZZI E COSTI Il calcolo di indennizzi e costi relativi alla servitù da elettrodo può essere complesso e varia in base alle circostanze specifiche.","a":"civ"},{"n":397,"q":"SERVITÚ","a":"gen"},{"n":398,"q":"AREE DI RISPETTO","a":"gen"},{"n":399,"q":"SERVITÙ PREDIALE","a":"civ"},{"n":400,"q":"NOTE DI TRASCRIZIONE DI ATTO DI COMPRAVENDITA","a":"civ"},{"n":401,"q":"TRASCRIZIONE","a":"gen"},{"n":402,"q":"PRESCRIZIONE La prescrizione per gli atti immobiliari riguarda il processo attraverso il quale il possesso di un bene immobile, esercitato in modo continuativo e pacifico, può trasformarsi nel diritto di proprietà, estinguendo quindi eventuali diritti di proprietà di terzi. ● Prescrizione Ordinaria: Per acquisire la proprietà di un immobile, il termine di prescrizione è di 20 anni. Il possesso deve essere continuo, pubblico, pacifico e non viziato da violenza. Durante questo periodo, il possessore deve comportarsi come se fosse il proprietario, senza contestazioni da parte di terzi. ● Prescrizione Breve: In alcuni casi specifici, esiste anche una prescrizione breve di 10 anni per beni immobili, che si applica generalmente ai diritti reali, come usufrutto o servitù. Perché il possesso possa portare alla prescrizione immobiliare, deve presentare tre caratteristiche fondamentali:","a":"civ"},{"n":403,"q":"LEGGE TOGNOLI E PARCHEGGI La Legge Tognoli (Legge n. 122 del 30 aprile 1985) è una normativa italiana volta a regolamentare la realizzazione di parcheggi e spazi di sosta, affrontando la mancanza di posti auto nelle città e migliorando la viabilità urbana.","a":"trib"},{"n":404,"q":"I COLLABORATORI SUBORDINATI CHI SONO?","a":"gen"},{"n":405,"q":"COSA È LA RAPPRESENTANZA PROCESSUALE? La rappresentanza processuale è un istituto giuridico che consente a una persona (rappresentante) di agire in giudizio per conto di un’altra (rappresentato). La rappresentanza processuale è necessaria in diverse situazioni:","a":"gen"},{"n":406,"q":"CHE OBBLIGHI HA L'INSTITORE?","a":"gen"},{"n":407,"q":"COSA SERVE SAPERE PER STIMARE L'USUFRUTTO? ******* non fare","a":"est"},{"n":408,"q":"LEGGE ZAGATTI (1998) La Legge Zagatti (Legge n. 448 del 28 dicembre 1998) è un'importante normativa italiana che si concentra sulla promozione della mobilità e sulla tutela dei diritti delle persone con disabilità. Lo scopo principale della legge è garantire l’accessibilità degli edifici pubblici e privati, attraverso miglioramenti strutturali che facilitino l’ingresso e l’utilizzo degli spazi da parte di individui con disabilità. La legge prevede:","a":"est"},{"n":409,"q":"CHE DIFFERENZA C’È TRA LOCAZIONE ED AFFITTO?","a":"civ"},{"n":410,"q":"COS’È IL RENT TO BUY?","a":"gen"},{"n":411,"q":"PERCHÈ È IMPORTANTE CHIAMARE L’AMMINISTRATORE DI CONDOMINIO QUANDO SI VENDE UNA CASA?","a":"civ"},{"n /* ============================ API ============================ */
async function callClaude(userText){
  if(!S.apiKey){openSettings(true);return null;}
  history.push({role:'user',content:userText});
  const body={
    model:S.model, max_tokens:1500, system:buildSystem(),
    messages:history.map(m=>({role:m.role,content:m.content}))
  };
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'content-type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify(body)
  });
  if(!res.ok){const t=await res.text();throw new Error('API '+res.status+': '+t.slice(0,200));}
  const data=await res.json();
  const text=(data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('');
  history.push({role:'assistant',content:text});
  return text;
}
function parseReply(raw){
  const i=raw.indexOf('===META===');
  let reply=raw, meta={};
  if(i>=0){reply=raw.slice(0,i).trim();let j=raw.slice(i+10).trim();j=j.replace(/^```json|```$/g,'').trim();try{meta=JSON.parse(j)}catch(e){}}
  return {reply,meta};
}

/* ============================ RENDER CHAT ============================ */
const chat=document.getElementById('chat');
function renderRich(text){
  let s=escapeHtml(text);
  // markdown: **bold**, *italic*
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g,'<em>$1</em>');
  // line breaks
  s=s.replace(/\n/g,'<br>');
  // wrap clickable words, but skip HTML tags and entities so we don't corrupt them
  return s.replace(/(<[^>]+>|&[a-zA-Z]+;|&#\d+;)|([A-Za-zÀ-ÿ']+)/g,(m,skip,word)=>skip?skip:('<w>'+word+'</w>'));
}
function addAI(reply,meta){
  const m=document.createElement('div');m.className='msg ai';
  const b=document.createElement('div');b.className='bubble';b.innerHTML=renderRich(reply);
  const row=document.createElement('div');row.className='row';
  const tts=document.createElement('button');tts.className='tts';tts.textContent='🔊';tts.onclick=()=>speak(reply);
  row.appendChild(tts);
  m.appendChild(b);m.appendChild(row);
  if(meta.suggestions&&meta.suggestions.length){
    const s=document.createElement('div');s.className='suggests';
    meta.suggestions.slice(0,3).forEach(t=>{const c=document.createElement('button');c.className='sg';c.textContent=t;c.onclick=()=>{document.getElementById('input').value=t;autosize();};s.appendChild(c);});
    m.appendChild(s);
  }
  chat.appendChild(m);
  b.querySelectorAll('w').forEach(w=>w.onclick=e=>defineWord(w.textContent,e));
  if(S.mode==='listening'){b.classList.add('masked');b.title='点击显示原文';b.addEventListener('click',()=>b.classList.remove('masked'),{once:true});}
  scrollDown();
  if(S.autoplay||S.mode==='listening'||S.mode==='speaking'||speakNext){speak(reply);}
  speakNext=false;
  saveConvo();
}
function addMe(text,meta){
  const m=document.createElement('div');m.className='msg me';
  const b=document.createElement('div');b.className='bubble';b.textContent=text;m.appendChild(b);
  if(meta&&meta.corrections&&meta.corrections.length){
    meta.corrections.forEach(c=>{
      const d=document.createElement('div');d.className='correction';
      d.innerHTML=`<span class="x">${escapeHtml(c.original||'')}</span> → <span class="v">${escapeHtml(c.fixed||'')}</span><span class="why">${escapeHtml(c.why||'')}</span>`;
      m.appendChild(d);
    });
  }
  chat.appendChild(m);scrollDown();saveConvo();
}

function convoKey(){
  if(S.mode==='scenario')return 'scenario:'+S.scenario;
  if(S.mode==='grammar')return 'grammar:'+S.grammar;
  if(S.mode==='conjugation')return 'conjugation:'+S.conjVerb;
  if(S.mode==='realestate')return 'realestate:'+(S.reMode||'teach')+':'+(S.reTopic||S.reArea||'');
  return S.mode||'free';
}
function saveConvo(){const k=convoKey();if(!k)return;S.convos=S.convos||{};S.convos[k]={html:chat.innerHTML,api:history.slice(-40),ts:Date.now()};save();}
function rebindChat(){
  chat.querySelectorAll('.ai .bubble w').forEach(w=>w.onclick=e=>defineWord(w.textContent,e));
  chat.querySelectorAll('.tts').forEach(t=>{const msg=t.closest('.msg');const b=msg&&msg.querySelector('.bubble');if(b)t.onclick=()=>speak(b.innerText);});
  chat.querySelectorAll('.sg').forEach(c=>c.onclick=()=>{input.value=c.textContent;autosize();});
  chat.querySelectorAll('.bubble.masked').forEach(b=>b.addEventListener('click',()=>b.classList.remove('masked'),{once:true}));
}
function restoreConvo(){const k=convoKey();const c=S.convos&&S.convos[k];if(c&&c.html){chat.innerHTML=c.html;history=c.api||[];rebindChat();scrollDown();return true;}return false;}
function showTyping(){const t=document.createElement('div');t.className='msg ai';t.id='typing';t.innerHTML='<div class="bubble typing"><span></span><span></span><span></span></div>';chat.appendChild(t);scrollDown();}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove();}
function scrollDown(){chat.scrollTop=chat.scrollHeight;}
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ============================ SEND FLOW ============================ */
const input=document.getElementById('input'),sendBtn=document.getElementById('sendBtn');
function autosize(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px';}
input.addEventListener('input',autosize);
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}});
sendBtn.onclick=doSend;

async function doSend(){
  const text=input.value.trim();if(!text)return;
  if(!S.apiKey){openSettings(true);return;}
  input.value='';autosize();
  const meDiv={text};addMe(text,null);
  showTyping();sendBtn.disabled=true;
  try{
    const raw=await callClaude(text);hideTyping();
    if(raw===null){sendBtn.disabled=false;return;}
    const {reply,meta}=parseReply(raw);
    // attach corrections to the last "me" bubble
    if(meta.corrections&&meta.corrections.length){
      const last=[...chat.querySelectorAll('.msg.me')].pop();
      meta.corrections.forEach(c=>{const d=document.createElement('div');d.className='correction';d.innerHTML=`<span class="x">${escapeHtml(c.original||'')}</span> → <span class="v">${escapeHtml(c.fixed||'')}</span><span class="why">${escapeHtml(c.why||'')}</span>`;last.appendChild(d);});
      scrollDown();
    }
    addAI(reply,meta);
    updateProfile(meta);
    bumpStreak();
  }catch(err){hideTyping();addAI('⚠️ '+err.message+'\n\n(请检查设置里的 API key / 模型名 / 网络。)',{});}
  sendBtn.disabled=false;
}

/* ============================ ADAPTIVE PROFILE ============================ */
function updateProfile(meta){
  (meta.errors||[]).forEach(e=>{
    if(e.startsWith('verb:')){const v=e.split(':')[1];if(v)S.profile.weak_verbs[v]=(S.profile.weak_verbs[v]||0)+1;}
    else{const k=e.replace(/^grammar:/,'');S.profile.weak_skills[k]=(S.profile.weak_skills[k]||0)+1;}
  });
  // vocab from AI
  (meta.vocab||[]).forEach(v=>{if(v.it&&!S.vocab.find(x=>x.it.toLowerCase()===v.it.toLowerCase()))S.vocab.push({it:v.it,zh:v.zh||'',strength:0,due:Date.now(),added:Date.now()});});
  // cefr drift
  if(meta.difficulty==='too_easy')S.cefrPct=Math.min(1,S.cefrPct+0.012);
  if(meta.difficulty==='too_hard')S.cefrPct=Math.max(0,S.cefrPct-0.006);
  if(meta.difficulty==='ok')S.cefrPct=Math.min(1,S.cefrPct+0.004);
  applyCefr();save();renderRing();
}
const LEVELS=['A2','B1','B1+','B2','B2+','C1'];
function applyCefr(){const idx=Math.min(LEVELS.length-1,Math.floor(S.cefrPct*LEVELS.length));S.cefr=LEVELS[idx];}
function renderRing(){
  const dash=107,off=dash*(1-S.cefrPct);
  document.getElementById('ringFill').setAttribute('stroke-dashoffset',off);
  document.getElementById('ringLvl').textContent=S.cefr.replace('+','');
}

function bumpStreak(){
  const today=new Date().toISOString().slice(0,10);
  if(S.lastDay===today)return;
  const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
  S.streak=(S.lastDay===y)?S.streak+1:1;S.lastDay=today;save();
  document.getElementById('streakN').textContent=S.streak;
}

}
function positionPop(ev){const r=document.querySelector('.app').getBoundingClientRect();let x=ev.clientX-r.left,y=ev.clientY-r.top+14;x=Math.min(Math.max(8,x-130),r.width-270);pop.style.left=x+'px';pop.style.top=y+'px';}

function pickVoice(){
  const vs=speechSynthesis.getVoices()||[];
  if(S.voiceURI){const v=vs.find(x=>x.voiceURI===S.voiceURI);if(v)return v;}
  const it=vs.filter(v=>/^it/i.test(v.lang));
  const male=it.find(v=>/(luca|paolo|diego|cosimo|giorgio|carlo|marco|maschile|\bmale\b|uomo)/i.test(v.name));
  const notFemale=it.find(v=>!/(alice|elsa|federica|donna|female|woman)/i.test(v.name));
  return male||notFemale||it[0]||null;
}
function speak(t){if(!('speechSynthesis'in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='it-IT';u.rate=0.96;u.pitch=0.85;const v=pickVoice();if(v)u.voice=v;speechSynthesis.speak(u);}
function populateVoices(){
  const sel=document.getElementById('vc');if(!sel)return;
  const vs=speechSynthesis.getVoices()||[];
  const it=vs.filter(v=>/^it/i.test(v.lang)), others=vs.filter(v=>!/^it/i.test(v.lang));
  const cur=S.voiceURI||(pickVoice()&&pickVoice().voiceURI)||'';
  const opt=v=>{const male=/(luca|paolo|diego|cosimo|giorgio|carlo|marco|maschile|\bmale\b|uomo)/i.test(v.name);return `<option value="${v.voiceURI}"${v.voiceURI===cur?' selected':''}>${male?'♂ ':''}${v.name} (${v.lang})</option>`;};
  sel.innerHTML=(it.length?'<optgroup label="意大利语">'+it.map(opt).join('')+'</optgroup>':'')+(others.length?'<optgroup label="其它语言(不推荐)">'+others.map(opt).join('')+'</optgroup>':'')||'<option value="">(系统暂无可用声音)</option>';
}

if('webkitSpeechRecognition'in window||'SpeechRecognition'in window){

  <div class="field"><label>模型</label><select id="mdl">
    <option value="claude-sonnet-4-6"${S.model==='claude-sonnet-4-6'?' selected':''}>Claude Sonnet 4.6（推荐·均衡）</option>
    <option value="claude-opus-4-8"${S.model==='claude-opus-4-8'?' selected':''}>Claude Opus 4.8（最强·较贵）</option>
    <option value="claude-haiku-4-5-20251001"${S.model==='claude-haiku-4-5-20251001'?' selected':''}>Claude Haiku 4.5（最快·最省）</option>
  </select></div>
  <div class="field"><label>导师名字</label><input id="tn" type="text" placeholder="Seneca" value="${escapeHtml(S.tutorName||'Seneca')}"><div class="help">给你的意大利语导师起个名字。他是个阳光快乐、有哲学家与积极心理学家气质的男性，会鼓励你、关心你的状态。</div></div>
  <div class="field"><label>目标等级</label><select id="tg">
    ${['B2','B2+','C1'].map(l=>`<option${S.target===l?' selected':''}>${l}</option>`).join('')}
  </select></div>
  <div class="field"><label>导师声音</label><select id="vc"></select><div class="help">优先男声、音调偏低更有磁性。iPhone 默认意语只有女声 Alice；要男声请到「设置→辅助功能→朗读内容→声音→意大利语」下载一个男声(如 Luca)，再回来这里选。</div><button class="btn ghost" id="tryVoice" style="margin-top:8px">🔊 试听</button></div>
  <div class="field"><label><input type="checkbox" id="ap" ${S.autoplay?'checked':''} style="width:auto;margin-right:6px">自动朗读导师消息（语音模式）</label></div>
  <button class="btn" id="saveSet">保存</button>
  ${force?'':'<button class="btn ghost" id="closeSet" style="margin-top:8px">关闭</button>'}`);
  populateVoices();
  document.getElementById('tryVoice').onclick=()=>{const sel=document.getElementById('vc').value;const vs=speechSynthesis.getVoices();const v=vs.find(x=>x.voiceURI===sel);speechSynthesis.cancel();const u=new SpeechSynthesisUtterance('Ciao! Sono '+(document.getElementById('tn').value.trim()||'Seneca')+', piacere di conoscerti.');u.lang='it-IT';u.rate=0.96;u.pitch=0.85;if(v)u.voice=v;speechSynthesis.speak(u);};
  document.getElementById('saveSet').onclick=()=>{S.apiKey=document.getElementById('ak').value.trim();S.model=document.getElementById('mdl').value;S.target=document.getElementById('tg').value;S.tutorName=document.getElementById('tn').value.trim()||'Seneca';S.voiceURI=document.getElementById('vc').value;S.autoplay=document.getElementById('ap').checked;save();closeSheet();if(!chat.children.length)kickoff();};
  const cs=document.getElementById('closeSet');if(cs)cs.onclick=closeSheet;
}
function openVocab(){
  const due=S.vocab.filter(v=>v.due<=Date.now()).length;
  openSheet(`<h2>词汇训练 📚</h2><div class="sub">点导师消息里的单词即可收藏</div>
  <div class="stat"><div class="c"><b>${S.vocab.length}</b><span>已收藏</span></div><div class="c"><b>${due}</b><span>待复习</span></div><div class="c"><b>${S.cefr}</b><span>当前等级</span></div></div>
  ${S.vocab.length?S.vocab.slice().reverse().map(v=>`<div class="vocab-item"><div><b>${escapeHtml(v.it)}</b> <span class="zh">${escapeHtml(v.zh)}</span></div><span class="zh">${'●'.repeat(Math.min(5,v.strength))||'新'}</span></div>`).join(''):'<div class="empty">还没有收藏的词。<br>在聊天里点任意意大利语单词试试。</div>'}
  ${S.vocab.length?'<button class="btn ghost" id="clrV" style="margin-top:14px">清空词汇</button>':''}`);
  const c=document.getElementById('clrV');if(c)c.onclick=()=>{if(confirm('确定清空所有收藏词？')){S.vocab=[];save();openVocab();}};
}
function openProgress(){
  const ws=Object.entries(S.profile.weak_skills).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const wv=Object.entries(S.profile.weak_verbs).sort((a,b)=>b[1]-a[1]).slice(0,6);
  openSheet(`<h2>学习进度 📈</h2><div class="sub">B1 → ${S.target} 路径</div>
  <div class="stat"><div class="c"><b>${S.cefr}</b><span>CEFR 估计</span></div><div class="c"><b>${Math.round(S.cefrPct*100)}%</b><span>进度</span></div><div class="c"><b>🔥 ${S.streak}</b><span>连续天数</span></div></div>
  <div class="field"><label>最需加强的语法点</label>${ws.length?'<div class="recap-list"><ul>'+ws.map(x=>`<li>${escapeHtml(x[0])} <span class="zh">(${x[1]}次)</span></li>`).join('')+'</ul></div>':'<div class="help">多聊几句，系统会自动诊断。</div>'}</div>
  <div class="field"><label>易错动词</label>${wv.length?'<div class="recap-list"><ul>'+wv.map(x=>`<li>${escapeHtml(x[0])} <span class="zh">(${x[1]}次)</span></li>`).join('')+'</ul></div>':'<div class="help">暂无数据。</div>'}</div>
  <button class="btn ghost" id="rst" style="margin-top:8px">重置全部学习数据</button>`);
  document.getElementById('rst').onclick=()=>{if(confirm('确定重置所有数据（含词汇、进度、密钥）？')){localStorage.removeItem(LS);location.reload();}};
}

/* ============================ HEADER BTNS ============================ */
document.getElementById('clearBtn').onclick=()=>{const k=convoKey();if(!confirm('清空当前模块的聊天记录？（只删这一个模块）'))return;if(S.convos)delete S.convos[k];save();history=[];chat.innerHTML='';if(S.apiKey)kickoff();};
document.getElementById('setBtn').onclick=()=>openSettings(false);
document.getElementById('ringBtn').onclick=openProgress;
document.getElementById('streakBtn').onclick=openProgress;
document.getElementById('themeBtn').onclick=()=>{S.theme=S.theme==='dark'?'light':'dark';applyTheme();save();};
function applyTheme(){document.documentElement.setAttribute('data-theme',S.theme);document.getElementById('themeBtn').textContent=S.theme==='dark'?'☀️':'🌙';}

// vocab quick access: long-press ring? add a chip
const vocabChip=document.createElement('button');vocabChip.className='chip';vocabChip.textContent='📖 我的词汇';vocabChip.onclick=openVocab;

/* ============================ BANNER ============================ */
function banner(html){const w=document.getElementById('bannerWrap');w.innerHTML=`<div class="banner">✨ <div>${html}</div></div>`;setTimeout(()=>{if(w.firstChild)w.firstChild.style.transition='opacity .5s';},10);}

/* ============================ INIT ============================ */
function init(){
  applyTheme();applyCefr();renderRing();renderModes();
  modebar.appendChild(vocabChip);
  document.getElementById('streakN').textContent=S.streak;
  if(!S.apiKey){
    banner('欢迎使用 Parla！请先点右上角 <b id="bset">⚙️ 设置</b> 填入你的 Claude API key，就能开始用意大利语聊天了。');
    setTimeout(()=>{const b=document.getElementById('bset');if(b)b.onclick=()=>openSettings(false);},50);
    openSettings(true);
  }else{
    if(!restoreConvo())kickoff();
  }
}
if(speechSynthesis)speechSynthesis.onvoiceschanged=()=>{};
init();
</script>
</body>
</html>
